<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>계정·데이터 삭제 · Delete account & data — Beautia</title>
<meta name="robots" content="index,follow">
<link rel="icon" href="/logo-mark.png">
<style>
  :root{--plum:#6E4A50;--plum2:#48323a;--gold:#C9A063;--ink:#2e2326;--sub:#8a7a76;--line:#efe4de;--cream:#faf6f3}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans JP','Noto Sans SC','Noto Sans Thai',sans-serif;color:var(--ink);background:var(--cream);line-height:1.65;-webkit-font-smoothing:antialiased}
  .hd{background:var(--plum2);color:#fff;padding:38px 24px 30px;text-align:center}
  .hd img{width:44px;display:block;margin:0 auto 10px}
  .hd .wm{font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:bold;letter-spacing:.3px}
  .hd .sub{font-size:13.5px;color:rgba(255,255,255,.7);margin-top:6px}
  .wrap{max-width:680px;margin:0 auto;padding:30px 22px 70px}
  h1{font-size:26px;font-weight:800;color:var(--plum2);margin-bottom:6px}
  .lead{font-size:15px;color:var(--sub);margin-bottom:24px}
  .lang{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px}
  .lang a{font-size:13px;font-weight:700;padding:7px 14px;border-radius:999px;border:1.5px solid var(--line);color:var(--sub);text-decoration:none;background:#fff;cursor:pointer}
  .lang a.on{background:var(--plum);color:#fff;border-color:var(--plum)}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px}
  .card h2{font-size:17px;font-weight:800;color:var(--plum);margin-bottom:10px;display:flex;align-items:center;gap:9px}
  .card h2 .n{width:26px;height:26px;border-radius:50%;background:var(--plum);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .card p{font-size:14.5px;color:var(--ink)}
  .card ul{margin:6px 0 0 2px;padding-left:18px}
  .card li{font-size:14.5px;margin:3px 0}
  a.mail{color:var(--plum);font-weight:800;text-decoration:none;border-bottom:1.5px solid var(--gold)}
  .muted{font-size:13px;color:var(--sub);margin-top:8px}
  .foot{font-size:12.5px;color:var(--sub);text-align:center;margin-top:28px;line-height:1.7}
  .foot b{color:var(--ink)}
</style>
</head>
<body>
<div class="hd"><img src="/logo-mark-white.png" alt="Beautia"><div class="wm">Beautia</div><div class="sub" id="hsub">Account & data deletion</div></div>
<div class="wrap">
  <div class="lang" id="lang"></div>
  <h1 id="h1"></h1><div class="lead" id="lead"></div>
  <div class="card"><h2><span class="n">1</span><span id="s1t"></span></h2><p id="s1b"></p></div>
  <div class="card"><h2><span class="n">2</span><span id="s2t"></span></h2><p id="s2b"></p><p class="muted" id="s2n"></p></div>
  <div class="card"><h2><span class="n">3</span><span id="s3t"></span></h2><p id="s3b"></p></div>
  <div class="card"><h2><span class="n">4</span><span id="s4t"></span></h2><p id="s4i"></p><ul id="s4l"></ul><p class="muted" id="s4n"></p></div>
  <div class="foot" id="foot"></div>
</div>
<script>
var MAIL='hello@beautia.io';
var T={
 ko:{lbl:'한국어',h1:'계정·데이터 삭제',lead:'Beautia 계정과 데이터를 삭제하거나, 계정을 유지한 채 데이터 일부만 삭제하는 방법입니다.',
  s1t:'앱에서 바로 삭제',s1b:'Beautia 앱 → <b>프로필(내 정보) 탭</b> → 하단 <b>‘회원탈퇴’</b> → 확인. 계정과 개인 데이터가 삭제됩니다.',
  s2t:'웹으로 계정 삭제 요청 (앱 없이)',s2b:'앱에 접근할 수 없다면 가입한 이메일로 <a class="mail" href="mailto:'+MAIL+'?subject=계정 삭제 요청">'+MAIL+'</a> 에 “계정 삭제 요청”을 보내주세요. 본인 확인 후 처리합니다.',s2n:'처리 기간: 요청 확인 후 영업일 기준 최대 7일 이내.',
  s3t:'계정은 유지하고 데이터 일부만 삭제',s3b:'계정을 삭제하지 않고 특정 데이터만 지우고 싶다면: 앱 내에서 올린 <b>사진·저장 항목·후기</b>를 직접 삭제할 수 있어요. 그 외 데이터 삭제는 <a class="mail" href="mailto:'+MAIL+'?subject=데이터 삭제 요청">'+MAIL+'</a> 로 삭제할 항목을 알려주시면 처리합니다.',
  s4t:'삭제되는 데이터',s4i:'계정 삭제 시 다음 개인 데이터가 제거됩니다:',s4l:['계정 정보(이메일·이름·프로필 사진)','포트폴리오·업로드 사진, 저장한 항목','예약·후기·메시지 내역','포인트·기기 식별자·푸시 토큰'],s4n:'보관: 법령상 보관 의무가 있는 거래·정산 기록은 관련 법이 정한 기간 동안만 최소 보관 후 파기합니다. 그 외 개인 데이터는 삭제 시 제거됩니다.',
  foot:'운영: <b>LUNATICS GROUP LLC</b> · 한국 사업자 <b>루나틱스</b> (783-03-03627)<br>문의: '+MAIL+' · 개인정보처리방침: <a href="/privacy" style="color:var(--plum)">beautia.io/privacy</a>'},
 en:{lbl:'English',h1:'Delete account & data',lead:'How to delete your Beautia account, or delete some of your data while keeping your account.',
  s1t:'Delete in the app',s1b:'Open the Beautia app → <b>Profile tab</b> → tap <b>“Delete account”</b> at the bottom → confirm. Your account and personal data are deleted.',
  s2t:'Request account deletion via web (no app)',s2b:'If you can’t access the app, email <a class="mail" href="mailto:'+MAIL+'?subject=Account deletion request">'+MAIL+'</a> from your registered email with an “Account deletion request”. We verify and process it.',s2n:'Processing time: within 7 business days of confirming your request.',
  s3t:'Delete some data without deleting your account',s3b:'To remove specific data while keeping your account: you can delete your <b>uploaded photos, saved items, and reviews</b> directly in the app. For other data, email <a class="mail" href="mailto:'+MAIL+'?subject=Data deletion request">'+MAIL+'</a> and tell us what to delete.',
  s4t:'What gets deleted',s4i:'When you delete your account, the following personal data is removed:',s4l:['Account info (email, name, profile photo)','Portfolio & uploaded photos, saved items','Bookings, reviews, and messages','Points, device identifiers, push tokens'],s4n:'Retention: Records we are legally required to keep (e.g., transaction/tax records) are retained only for the period required by law, then deleted. All other personal data is removed upon deletion.',
  foot:'Operated by <b>LUNATICS GROUP LLC</b> · Korea business <b>Lunatics</b> (783-03-03627)<br>Contact: '+MAIL+' · Privacy Policy: <a href="/privacy" style="color:var(--plum)">beautia.io/privacy</a>'},
 ja:{lbl:'日本語',h1:'アカウント・データの削除',lead:'Beautiaのアカウントとデータを削除する方法、またはアカウントを残したまま一部のデータを削除する方法です。',
  s1t:'アプリから削除',s1b:'Beautiaアプリ → <b>プロフィールタブ</b> → 下部の<b>「アカウント削除」</b> → 確認。アカウントと個人データが削除されます。',
  s2t:'ウェブからアカウント削除を依頼（アプリ不要）',s2b:'アプリにアクセスできない場合、登録メールから <a class="mail" href="mailto:'+MAIL+'?subject=Account deletion request">'+MAIL+'</a> に「アカウント削除依頼」をお送りください。本人確認後に処理します。',s2n:'処理期間：依頼確認後、営業日ベースで最大7日以内。',
  s3t:'アカウントを残して一部データのみ削除',s3b:'アカウントを削除せずに特定のデータだけ消したい場合：アプリ内で<b>アップロード写真・保存項目・レビュー</b>を直接削除できます。その他のデータは <a class="mail" href="mailto:'+MAIL+'?subject=Data deletion request">'+MAIL+'</a> に削除したい項目をご連絡ください。',
  s4t:'削除されるデータ',s4i:'アカウント削除時、以下の個人データが削除されます：',s4l:['アカウント情報（メール・名前・プロフィール写真）','ポートフォリオ・アップロード写真、保存項目','予約・レビュー・メッセージ履歴','ポイント・端末識別子・プッシュトークン'],s4n:'保管：法令上の保管義務がある取引・精算記録は、関連法が定める期間のみ最小限保管後に破棄します。その他の個人データは削除時に消去されます。',
  foot:'運営：<b>LUNATICS GROUP LLC</b> · 韓国事業者 <b>Lunatics</b> (783-03-03627)<br>お問い合わせ：'+MAIL+' · プライバシーポリシー：<a href="/privacy" style="color:var(--plum)">beautia.io/privacy</a>'},
 zh:{lbl:'中文',h1:'删除账号与数据',lead:'如何删除你的 Beautia 账号，或在保留账号的情况下删除部分数据。',
  s1t:'在应用内删除',s1b:'打开 Beautia 应用 → <b>个人资料页</b> → 点击底部<b>「注销账号」</b> → 确认。你的账号和个人数据将被删除。',
  s2t:'通过网页申请删除账号（无需应用）',s2b:'若无法使用应用，请用注册邮箱发送“账号删除申请”至 <a class="mail" href="mailto:'+MAIL+'?subject=Account deletion request">'+MAIL+'</a>。核实身份后处理。',s2n:'处理时间：确认申请后 7 个工作日内。',
  s3t:'保留账号，仅删除部分数据',s3b:'若想保留账号仅删除特定数据：可在应用内直接删除<b>上传的照片、收藏项和评价</b>。其他数据请发送邮件至 <a class="mail" href="mailto:'+MAIL+'?subject=Data deletion request">'+MAIL+'</a> 并说明要删除的内容。',
  s4t:'将被删除的数据',s4i:'注销账号时，以下个人数据将被删除：',s4l:['账号信息（邮箱、姓名、头像）','作品集与上传照片、收藏项','预约、评价和消息记录','积分、设备标识符、推送令牌'],s4n:'保留：依法必须保留的交易/税务记录，仅在法律规定期限内最小化保留后删除。其他个人数据在删除时移除。',
  foot:'运营方：<b>LUNATICS GROUP LLC</b> · 韩国营业者 <b>Lunatics</b> (783-03-03627)<br>联系：'+MAIL+' · 隐私政策：<a href="/privacy" style="color:var(--plum)">beautia.io/privacy</a>'},
 th:{lbl:'ไทย',h1:'ลบบัญชีและข้อมูล',lead:'วิธีลบบัญชี Beautia ของคุณ หรือลบข้อมูลบางส่วนโดยยังเก็บบัญชีไว้',
  s1t:'ลบในแอป',s1b:'เปิดแอป Beautia → <b>แท็บโปรไฟล์</b> → แตะ <b>“ลบบัญชี”</b> ด้านล่าง → ยืนยัน บัญชีและข้อมูลส่วนบุคคลจะถูกลบ',
  s2t:'ขอลบบัญชีผ่านเว็บ (ไม่ต้องใช้แอป)',s2b:'หากเข้าแอปไม่ได้ ส่งอีเมลจากอีเมลที่ลงทะเบียนไปที่ <a class="mail" href="mailto:'+MAIL+'?subject=Account deletion request">'+MAIL+'</a> พร้อมข้อความ “ขอลบบัญชี” เราจะยืนยันตัวตนและดำเนินการ',s2n:'ระยะเวลาดำเนินการ: ภายใน 7 วันทำการหลังยืนยันคำขอ',
  s3t:'ลบข้อมูลบางส่วนโดยไม่ลบบัญชี',s3b:'หากต้องการลบเฉพาะบางข้อมูลโดยเก็บบัญชีไว้: คุณลบ<b>รูปที่อัปโหลด รายการที่บันทึก และรีวิว</b>ได้เองในแอป สำหรับข้อมูลอื่น ส่งอีเมลไปที่ <a class="mail" href="mailto:'+MAIL+'?subject=Data deletion request">'+MAIL+'</a> และแจ้งสิ่งที่ต้องการลบ',
  s4t:'ข้อมูลที่จะถูกลบ',s4i:'เมื่อลบบัญชี ข้อมูลส่วนบุคคลต่อไปนี้จะถูกลบ:',s4l:['ข้อมูลบัญชี (อีเมล ชื่อ รูปโปรไฟล์)','ผลงานและรูปที่อัปโหลด รายการที่บันทึก','ประวัติการจอง รีวิว และข้อความ','พอยต์ ตัวระบุอุปกรณ์ โทเคนแจ้งเตือน'],s4n:'การเก็บรักษา: บันทึกที่กฎหมายกำหนดให้เก็บ (เช่น ธุรกรรม/ภาษี) จะเก็บเท่าที่กฎหมายกำหนดแล้วลบ ข้อมูลส่วนบุคคลอื่นจะถูกลบเมื่อลบบัญชี',
  foot:'ดำเนินการโดย <b>LUNATICS GROUP LLC</b> · ผู้ประกอบการเกาหลี <b>Lunatics</b> (783-03-03627)<br>ติดต่อ: '+MAIL+' · นโยบายความเป็นส่วนตัว: <a href="/privacy" style="color:var(--plum)">beautia.io/privacy</a>'}
};
var ORDER=['ko','en','ja','th','zh'];
function render(l){var t=T[l];document.documentElement.lang=l;
 document.getElementById('h1').textContent=t.h1;document.getElementById('lead').textContent=t.lead;
 document.getElementById('s1t').textContent=t.s1t;document.getElementById('s1b').innerHTML=t.s1b;
 document.getElementById('s2t').textContent=t.s2t;document.getElementById('s2b').innerHTML=t.s2b;document.getElementById('s2n').textContent=t.s2n;
 document.getElementById('s3t').textContent=t.s3t;document.getElementById('s3b').innerHTML=t.s3b;
 document.getElementById('s4t').textContent=t.s4t;document.getElementById('s4i').textContent=t.s4i;
 document.getElementById('s4l').innerHTML=t.s4l.map(function(x){return '<li>'+x+'</li>';}).join('');document.getElementById('s4n').textContent=t.s4n;
 document.getElementById('foot').innerHTML=t.foot;
 Array.prototype.forEach.call(document.querySelectorAll('.lang a'),function(a){a.classList.toggle('on',a.dataset.l===l);});
}
(function(){var box=document.getElementById('lang');ORDER.forEach(function(l){var a=document.createElement('a');a.textContent=T[l].lbl;a.dataset.l=l;a.onclick=function(){render(l);};box.appendChild(a);});
 var nav=(navigator.language||'en').slice(0,2).toLowerCase();render(ORDER.indexOf(nav)>=0?nav:'ko');})();
</script>
</body>
</html>
