<style>
:root{
 --bg:#FFFFFF;--ink:#1A1416;--ink2:#6B6064;--sub:#A99FA2;--line:#EFEAEB;--line2:#F5F1F2;--soft:#F7F1F2;--tint:#FBF7F8;--pagebg:#FFFFFF;--paper:#FFFFFF;
 --accent:#6D4346;--accentsoft:#F1E7E8;--plum:#6D4346;--plum2:#532F33;--gold:#9A7A3A;--rose:#8A555B;--rosebg:#F1E7E8;--plumbg:#F1E9EA;--goldbg:#F2ECDE;
 --serif:'Pretendard',system-ui,sans-serif;--disp:'Playfair Display',Georgia,serif;
 --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--r1:8px;--r2:12px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
html{overflow-x:hidden;}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;overflow-x:hidden;font-size:14px;letter-spacing:-.01em;}
a{color:inherit;text-decoration:none;}
.tnum{font-variant-numeric:tabular-nums;}.muted{color:var(--sub);}
.kicker{font-size:10.5px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);}
.btn{font-family:inherit;cursor:pointer;border:none;border-radius:999px;font-weight:600;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px;transition:.16s ease;white-space:nowrap;letter-spacing:-.01em;}
.btn:active{transform:scale(.985);}
.btn-primary{background:var(--plum);color:#fff;}.btn-primary:hover{background:var(--plum2);}
.btn-kakao{background:#FEE500;color:#3A1D1D;}
.btn-ghost{background:transparent;color:var(--plum);border:1px solid var(--plum);}
.btn-ghost:hover{background:var(--plum);color:#fff;}
.av{border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:inherit;font-weight:600;letter-spacing:0;}
.panel{background:transparent;border:none;border-radius:0;}
.panel+.panel{margin-top:var(--s6);}
.panel-h{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:1.4px;text-transform:uppercase;padding:0 0 12px;}

/* header */
.hdr{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:60;}
.hwrap{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:var(--s8);height:56px;padding:0 var(--s6);}
.logo{flex:0 0 auto;display:flex;align-items:center;}
.logo img{height:24px;display:block;}
.gnav{display:flex;gap:var(--s6);}
.gnav a{font-size:14px;font-weight:500;color:var(--ink2);cursor:pointer;position:relative;padding:4px 0;transition:.14s;}
.gnav a.on{color:var(--ink);font-weight:600;}
.gnav a:hover{color:var(--ink);}
.hsearch{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid transparent;border-radius:999px;padding:9px 15px;width:200px;color:var(--sub);transition:.16s;}
.hsearch:focus-within{background:#fff;border-color:var(--line);box-shadow:0 1px 8px -4px rgba(0,0,0,.15);}
.hsearch input{flex:1;border:none;background:transparent;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;}
.hright{display:flex;align-items:center;gap:var(--s4);flex:0 0 auto;}
.hright .av{width:34px;height:34px;font-size:15px;cursor:pointer;}
.ptschip{font-size:12.5px;font-weight:800;color:var(--plum);background:var(--plumbg);padding:7px 12px;border-radius:999px;cursor:pointer;letter-spacing:-.01em;font-variant-numeric:tabular-nums;white-space:nowrap;}
@media(max-width:560px){.ptschip{display:none;}}
.ptspanel{background:var(--plum);color:#fff;border-radius:16px;padding:20px 22px;margin-top:var(--s5);}
.ptspanel .pbig{font-family:var(--disp);font-size:34px;font-weight:700;line-height:1;letter-spacing:-.01em;}
.ptspanel .plbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-bottom:8px;}
.ptspanel .pnote{font-size:12px;color:rgba(255,255,255,.78);margin-top:10px;line-height:1.6;}
.refbox{background:var(--soft);border-radius:14px;padding:16px 18px;margin-top:14px;}
.refbox h4{font-size:14px;font-weight:800;letter-spacing:-.02em;}
.refbox p{font-size:12.5px;color:var(--ink2);margin-top:6px;line-height:1.6;}
.refrow{display:flex;gap:8px;margin-top:12px;}
.refrow input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:12.5px;color:var(--ink2);background:#fff;outline:none;}
.prulelist{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.prulelist .pr{font-size:12px;font-weight:600;color:var(--plum);background:var(--plumbg);padding:6px 12px;border-radius:999px;}
.phist{margin-top:14px;}
.phrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--line2);font-size:13px;}
.phrow:first-child{border-top:none;}
.phrow .pa{font-weight:800;color:var(--plum);font-variant-numeric:tabular-nums;}
.phrow .pr2{color:var(--ink2);}.phrow .pd{color:var(--sub);font-size:11.5px;}
.langtog{display:flex;background:var(--soft);border-radius:999px;overflow:hidden;font-size:12px;font-weight:600;padding:3px;gap:2px;}
.langtog span{padding:5px 11px;cursor:pointer;color:var(--sub);border-radius:999px;transition:.14s;}
.langtog span.on{background:#fff;color:var(--plum);box-shadow:0 1px 3px rgba(0,0,0,.08);}
@media(max-width:900px){.gnav,.hsearch{display:none;}}

/* layout */
.wrap{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:176px minmax(0,1fr) 264px;gap:32px;padding:18px var(--s6) 48px;align-items:start;}
.col-side{position:sticky;top:76px;}
@media(max-width:1080px){.wrap{grid-template-columns:160px minmax(0,1fr);gap:28px;}.col-right{display:none;}}
@media(max-width:760px){.wrap{display:block;padding:var(--s5) var(--s4) 60px;}.col-left{display:none;}}

/* left nav */
.lnav{padding:0;}
.lnav .lh{font-size:10.5px;font-weight:700;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;padding:0 0 12px;margin-top:28px;}
.lnav .lh:first-child{margin-top:0;}
.lnav a{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;font-size:14px;font-weight:500;color:var(--ink2);cursor:pointer;transition:.13s;}
.lnav a .ti{font-size:17px;color:var(--sub);width:18px;text-align:center;transition:.13s;}
.lnav a .cnt{margin-left:auto;font-size:11.5px;color:var(--sub);font-weight:500;}
.lnav a:hover{background:var(--soft);color:var(--ink);}
.lnav a.on{background:var(--plum);color:#fff;font-weight:600;}
.lnav a.on .ti,.lnav a.on .cnt{color:rgba(255,255,255,.78);}
.lnav .div{height:1px;background:var(--line);margin:18px 12px 0;}

/* board top */
.board-top{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);margin-bottom:12px;}
.sorttabs{display:flex;gap:var(--s1);background:var(--soft);border-radius:999px;padding:4px;}
.stab{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--sub);padding:8px 16px;border-radius:999px;cursor:pointer;transition:.14s;}
.stab .ti{font-size:15px;}
.stab:hover{color:var(--ink);}
.stab.on{background:#fff;color:var(--plum);box-shadow:0 1px 4px rgba(0,0,0,.07);}
.regsel{border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-family:inherit;font-size:12.5px;color:var(--ink2);background:#fff;outline:none;cursor:pointer;}
.boardhead{display:flex;align-items:baseline;gap:10px;padding:0 0 14px;}
.boardhead h1{font-size:21px;font-weight:800;letter-spacing:-.03em;line-height:1.1;}
.boardhead .c{font-size:12.5px;color:var(--sub);font-weight:500;}

/* image-led feed grid */
.feedgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px 16px;}
@media(max-width:1080px){.feedgrid{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:560px){.feedgrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;}}
.card{display:flex;flex-direction:column;background:transparent;border:none;border-radius:0;margin:0;padding:0;overflow:visible;cursor:pointer;}
.vote,.cthumb,.cmedia{display:none;}
.cover{position:relative;width:100%;aspect-ratio:5/4;border-radius:12px;overflow:hidden;background:var(--soft);}
.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1;transition:transform .5s cubic-bezier(.2,.6,.2,1);}
.card:hover .cover img{transform:scale(1.045);}
.cover .ptext{position:absolute;inset:0;z-index:0;display:flex;align-items:flex-end;padding:18px;color:#fff;font-size:19px;font-weight:800;letter-spacing:-.025em;line-height:1.3;}
.cover .scrim{display:none;}
.cover .catchip{position:absolute;left:11px;top:11px;z-index:3;background:rgba(20,15,13,.5);backdrop-filter:blur(6px);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:999px;}
.cover .newchip{position:absolute;right:11px;top:11px;z-index:3;background:var(--accent);color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;padding:4px 9px;border-radius:999px;}
.cover .morechip{position:absolute;right:11px;bottom:11px;z-index:3;background:rgba(20,15,13,.62);backdrop-filter:blur(4px);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:4px;}
.cbody{padding:9px 2px 0;}
.chead{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);flex-wrap:wrap;margin-top:6px;}
.chead .av{display:none;}
.chead .cat{display:none;}
.rbadge{font-size:11.5px;font-weight:500;padding:0;color:var(--ink2);}
.rb-guest{color:var(--sub);}.rb-owner{color:var(--plum);}.rb-designer{color:#3E7C7B;}.rb-official{color:var(--gold);}
.chead .dot{width:2.5px;height:2.5px;border-radius:50%;background:var(--sub);opacity:.55;}
.ctitle{font-size:14px;font-weight:700;margin-top:0;letter-spacing:-.02em;line-height:1.38;transition:color .14s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card.nophoto .ctitle{display:none;}
/* 사진 없는 글 = 텍스트 카드 */
.card.nophoto .npcard{display:flex;flex-direction:column;height:100%;background:#fff;border:1px solid var(--line);border-left:3px solid var(--ac);border-radius:12px;padding:16px 16px 14px;transition:.14s;}
.card.nophoto:hover .npcard{border-color:var(--ac);box-shadow:0 6px 18px rgba(26,20,22,.08);transform:translateY(-2px);}
.npcat{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ac);}
.nptitle{font-size:16px;font-weight:800;line-height:1.4;letter-spacing:-.02em;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card.nophoto.read .nptitle{color:var(--sub);}
.npexc{font-size:13px;color:var(--ink2);line-height:1.6;margin-top:9px;flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.npfoot{margin-top:12px;}
.cexc{font-size:12px;color:var(--ink2);margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card:not(.nophoto) .cexc{display:none;}
.ctags{display:none;}
/* lead — full-width hero */
.card.lead{grid-column:1 / -1;margin-bottom:8px;}
.card.lead .cover{aspect-ratio:128/45;border-radius:18px;}
.card.lead .cover .scrim{display:block;position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(15,11,10,.72) 0%,rgba(15,11,10,.32) 55%,transparent 100%);}
.card.lead .leadtext{position:absolute;left:0;bottom:0;z-index:3;padding:34px 38px;max-width:74%;color:#fff;}
.card.lead .lead-cat{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.92);}
.card.lead .lead-title{font-size:29px;font-weight:800;letter-spacing:-.035em;line-height:1.18;margin-top:11px;}
.card.lead .lead-exc{font-size:14px;line-height:1.55;margin-top:10px;opacity:.9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card.lead .cover .ptext,.card.lead .cbody{display:none;}
@media(max-width:760px){.card.lead .cover{aspect-ratio:16/10;}.card.lead .leadtext{max-width:92%;padding:24px;}.card.lead .lead-title{font-size:23px;}}

.dtags{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px;}
.dtag{font-size:12.5px;font-weight:500;color:var(--ink2);background:var(--soft);padding:6px 13px;border-radius:999px;}.dtag::before{content:'#';color:var(--sub);}
.charcount{font-size:11px;color:var(--sub);text-align:right;margin-top:4px;}
.cmedia{display:none;}
/* retention */
.newdot{font-size:9px;font-weight:800;color:#fff;background:var(--accent);padding:2px 6px;border-radius:999px;letter-spacing:.4px;}
.card.read .ctitle{color:var(--sub);}
.streak{display:flex;align-items:center;gap:11px;background:var(--soft);border:none;border-radius:12px;padding:11px 14px;margin-bottom:16px;}
.streak .fire{font-size:22px;line-height:1;}
.streak .sn{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.streak .sl{font-size:11.5px;color:var(--ink2);margin-top:2px;}
.related{margin-top:48px;padding-top:var(--s6);border-top:1px solid var(--line);}
.related h4{font-size:17px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em;}
.rel{display:flex;gap:14px;align-items:center;padding:14px 0;border-top:1px solid var(--line2);cursor:pointer;}
.rel:first-of-type{border-top:none;}
.rel:hover .rt{color:var(--accent);}
.rel .rt{flex:1;font-size:15px;font-weight:600;line-height:1.45;letter-spacing:-.015em;transition:.14s;}
.rel .rm{font-size:11.5px;color:var(--sub);margin-top:3px;font-weight:500;}
.rel .rc{font-size:12px;color:var(--sub);white-space:nowrap;font-weight:500;}
.fab{position:fixed;right:24px;bottom:24px;z-index:80;width:46px;height:46px;border-radius:50%;background:var(--plum);border:none;box-shadow:0 10px 28px -10px rgba(109,67,70,.6);display:none;align-items:center;justify-content:center;color:#fff;cursor:pointer;}
.fab.on{display:flex;}.fab .ti{font-size:21px;}
/* member / profile */
.rolepick{display:flex;gap:8px;margin-top:10px;}
.rolecard{padding:15px 8px;}
.pfava{display:flex;align-items:center;gap:14px;margin-top:10px;}
.pfava .pv{width:76px;height:76px;border-radius:50%;background:var(--soft);background-size:cover;background-position:center;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:26px;border:1px solid var(--line);cursor:pointer;overflow:hidden;}
.pfava .pi{flex:1;min-width:0;}
.pfava .pi .h{font-size:13px;font-weight:700;}
.pfava .pi .s{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5;}
.pfava .pi button{margin-top:8px;font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--plum);}
.pfava .pi button:hover{border-color:var(--plum);}
.rolecard{flex:1;border:1px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;transition:.14s;}
.rolecard.on{border-color:var(--plum);background:var(--tint);}
.rolecard .ti{font-size:25px;color:var(--ink);}

function downscale(file,cb,maxArg){const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const max=maxArg||900;let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cb(cv.toDataURL('image/jpeg',0.8));};img.src=ev.target.result;};r.readAsDataURL(file);}
/* 이미지 → 축소 후 Supabase Storage 업로드, 실패 시 base64 폴백 */
function uploadImg(file,maxArg){return new Promise(resolve=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=async()=>{const max=maxArg||1200;let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);const dataUrl=cv.toDataURL('image/jpeg',0.82);try{if(ME.uid&&cv.toBlob){const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.82));if(blob){const path=ME.uid+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.jpg';const {error}=await SB.storage.from('beautia').upload(path,blob,{contentType:'image/jpeg',upsert:false});if(!error){const {data}=SB.storage.from('beautia').getPublicUrl(path);if(data&&data.publicUrl){resolve(data.publicUrl);return;}}}}}catch(e){console.warn('upload',e);}resolve(dataUrl);};img.src=ev.target.result;};r.readAsDataURL(file);});}

async function saveProfile(){
  if(!pfRole){toast(t('needRole'));return;}
  const nf=$('pfNick');if(!nf){toast(t('needRole'));return;}
  const n=nf.value.trim();if(!n){toast(t('needTC'));return;}
  if(pfMode==='profile'&&(!pfAgreeTerms||!pfAgreePrivacy)){toast(t('needAgree'));return;}
  if(!ME.uid){toast('로그인이 필요해요');return;}
  const area=$('pfRegionSel').value;
  const gv=id=>$(id)?$(id).value.trim():'';
  let shop={avatar:pfAvatar||'',insta:gv('pfInsta')};
  if(pfRole==='owner'){shop.name=gv('pfShop');shop.area=area;shop.services=pfServices.slice();shop.locDetail=gv('pfLoc');shop.hours=gv('pfHours');shop.koOK=!!pfKoOK;shop.shopDesc=gv('pfDesc');shop.photos=pfPhotos.slice();}
  else if(pfRole==='designer'){shop.name=gv('pfShop');shop.area=area;shop.career=($('pfCareer')?gv('pfCareer'):pfCareer);shop.specialties=pfSpec.slice();shop.photos=pfPhotos.slice();}
  else{shop.situation=pfSitu||'';}
  const payload={id:ME.uid,nickname:n,role:pfRole,region:area,bio:$('pfBio').value.trim(),interests:(pfRole==='guest')?pfInterests.slice():[],shop};
  const {error}=await SB.from('profiles').upsert(payload);
  if(error){toast('저장 실패: '+error.message);return;}
  const wasJoin=(pfMode!=='edit');
  closeModal();await reloadAll();
  if(wasJoin){toast(t('joinDone'));setTimeout(()=>{award(PTS.signup,t('earnSignup'),'signup:'+ME.uid);if(ME.invitedBy){award(PTS.invite,t('earnInvited'),'invited:'+ME.uid);}},700);}
  else toast(t('saved'));
}

const _trCache={};
async function gptTranslate(text){const k=LANG+'::'+text;if(_trCache[k])return _trCache[k];
  const r=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,target:LANG})});
  if(!r.ok)throw new Error('http '+r.status);const j=await r.json();if(!j.translated)throw new Error(j.error||'no');_trCache[k]=j.translated;return j.translated;}
async function trDetail(el){const p=DB.posts.find(x=>x.id===openId);if(!p)return;const box=$('trDetailBox');if(!box)return;
  if(box.dataset.done==='1'){const sh=box.style.display==='none';box.style.display=sh?'block':'none';el.innerHTML='<i class="ti ti-language"></i> '+(sh?t('gptShowOrig'):t('gptT'));return;}
  el.innerHTML='<i class="ti ti-language"></i> '+t('gptTing');
  try{const tr=await gptTranslate(bodyOf(p));box.textContent=tr;box.style.display='block';box.dataset.done='1';el.innerHTML='<i class="ti ti-language"></i> '+t('gptShowOrig');}
  catch(e){toast(t('gptFail'));el.innerHTML='<i class="ti ti-language"></i> '+t('gptT');}}

    <div class="cf-by">${esc(p.nick||'')}${reg?' · '+regFlag(p.region)+' '+esc(regL(p.region)):''}</div>
    <div class="cf-foot"><div><div class="cf-brand">Beautia</div><div class="cf-tag">일본 미용실·네일 한국어 예약 · 韓国語予約</div></div><div class="cf-h">@beautia.japan</div></div>
  </div>`;}
async function shareCardBlob(p){if(typeof html2canvas==='undefined')return null;
  const tmp=document.createElement('div');tmp.style.cssText='position:fixed;left:-99999px;top:0;z-index:-1;';
  tmp.innerHTML='<div class="cardframe">'+cardInner(p)+'</div>';document.body.appendChild(tmp);
  try{const cv=await html2canvas(tmp.firstChild,{scale:2,useCORS:true,backgroundColor:null});return await new Promise(r=>cv.toBlob(r,'image/png'));}
  catch(e){return null;}finally{tmp.remove();}}

  else{const L=myTab==='posts'?mine:scraps;listHtml=L.length?`<div class="feedgrid">${L.map((p,i)=>cardHtml(p,i,false)).join('')}</div>`:`<div class="empty" style="border:none">${myTab==='posts'?t('noPosts'):t('noScraps')}</div>`;}
  const refLink=location.origin+location.pathname+'?ref='+ME.ref;
  const histHtml=(ME.pointLog&&ME.pointLog.length)?ME.pointLog.slice(0,8).map(e=>`<div class="phrow"><span class="pr2">${esc(e.r)}</span><span style="display:flex;gap:12px;align-items:center"><span class="pd">${timeago(e.t)}</span><span class="pa">+${e.a.toLocaleString()}P</span></span></div>`).join(''):`<div class="empty" style="border:none;padding:24px">${t('noPoints')}</div>`;
  const pointsHtml=`
    <div class="ptspanel"><div class="plbl">${t('myPoints')}</div><div class="pbig">✦ ${(ME.points||0).toLocaleString()}P</div><div class="pnote">${t('pointSoon')}</div></div>
    <div class="prulelist"><span class="pr">${t('ruleReview')}</span><span class="pr">${t('rulePhoto')}</span><span class="pr">${t('ruleDetail')}</span><span class="pr">${t('ruleComment')}</span><span class="pr">${t('ruleInvite')}</span></div>
    <div class="refbox"><h4>${t('referral')}</h4><p>${t('refDesc')}</p><div class="refrow"><input id="refIn" readonly value="${refLink}"><button class="btn btn-primary" onclick="copyRef()">${t('refCopy')}</button></div></div>
    <div class="phist"><div class="panel-h" style="padding:0 0 6px">${t('pointHist')}</div>${histHtml}</div>`;
  $('main').innerHTML=`
    <div class="back" onclick="backFeed()" style="margin-bottom:14px"><i class="ti ti-chevron-left"></i> ${t('back')}</div>
    <div class="profhead">${avHtml(ME.nick,ME.avatar)}
      <div style="flex:1;min-width:0"><div class="pn">${esc(ME.nick)} ${roleBadge(ME.role)}${ME.verified?`<span class="vchip"><i class="ti ti-rosette-discount-check-filled"></i> ${t('verifiedMember')}</span>`:''}</div>
      <div class="pm">${ME.region&&ME.region!=='전체'?regFlag(ME.region)+' '+esc(regL(ME.region))+' · ':''}${t('joinedOn')} ${days}${t('daysAgo')} · 🔥 ${ME.visit.streak}${t('dayUnit')}${(S.insta)?` · <a href="${instaUrl(S.insta)}" target="_blank" style="color:var(--plum);font-weight:700"><i class="ti ti-brand-instagram"></i> ${esc(S.insta.replace(/^https?:\/\/(www\.)?instagram\.com\//,'@').replace(/\/$/,''))}</a>`:''}</div>
      ${ME.bio?`<div class="pbio">${esc(ME.bio)}</div>`:''}</div>
      <div class="pact"><button class="btn btn-ghost btn-sm" onclick="openEditProfile()"><i class="ti ti-edit"></i> ${t('editProfile')}</button><button class="btn btn-ghost btn-sm" onclick="logout()"><i class="ti ti-logout"></i> ${t('logout')}</button></div></div>
    <div class="pstats">
      <div class="pstat"><div class="n tnum">${mine.length}</div><div class="l">${t('tabPosts')}</div></div>
      <div class="pstat"><div class="n tnum">${myCmts}</div><div class="l">${t('tabComments')}</div></div>
      <div class="pstat"><div class="n tnum">${recvLikes}</div><div class="l">${t('recvLikes')}</div></div>
      <div class="pstat"><div class="n tnum">${ME.scraps.length}</div><div class="l">${t('scrap')}</div></div></div>
    ${pointsHtml}
    ${shop}${designer}${interests}
    <div class="pseg"><span class="s ${myTab==='posts'?'on':''}" onclick="setMyTab('posts')">${t('tabPosts')}</span><span class="s ${myTab==='scraps'?'on':''}" onclick="setMyTab('scraps')">${t('tabScraps')}</span><span class="s ${myTab==='comments'?'on':''}" onclick="setMyTab('comments')">${t('tabComments')}</span></div>
    <div style="margin-top:14px">${listHtml}</div>`;
}
function closeModal(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on'));}
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal();}));

document.documentElement.lang=LANG;
window.addEventListener('scroll',()=>{$('fab').classList.toggle('on',window.scrollY>500);});
async function geoAutoLang(){
  try{
    var q=new URLSearchParams(location.search).get('lang');
    if(q==='ja'||q==='ko')return;                       // URL이 우선
    if(localStorage.getItem('beautia_lang'))return;      // 사용자가 고른 적 있으면 유지
    const r=await fetch('https://ipwho.is/?fields=country_code');const j=await r.json();
    const cc=(j&&j.country_code)||'';
    const lang=(cc==='JP')?'ja':'ko';                    // 일본이면 일본어, 그 외 한국어
    localStorage.setItem('beautia_lang',lang);LANG=lang;document.documentElement.lang=lang;
  }catch(e){}
}
async function boot(){
  loadLocal();
  await geoAutoLang();
  const {data:{session}}=await SB.auth.getSession();
  await refreshProfile(session);
  await loadPosts();
  applyDeepLink();
  renderHeader();renderShell();renderMain();
  const dpost=new URLSearchParams(location.search).get('post');
  if(dpost){const pid=/^\d+$/.test(dpost)?+dpost:dpost;if(DB.posts.some(p=>p.id===pid))openPost(pid);}
  if(ME.needProfile)openCompleteProfile();
  else if(ME._newVisit&&ME.visit&&ME.visit.streak>1)setTimeout(()=>toast('🔥 '+ME.visit.streak+t('dayUnit')+' '+t('streakLabel')+'!'),800);
}
function applyDeepLink(){try{const q=new URLSearchParams(location.search);
  const c=q.get('cat');if(c&&CATS.some(x=>x[0]===c))curCat=c;
  const r=q.get('region');if(r&&(r==='전체'||RGROUPS.some(g=>g[1].includes(r))))curRegion=r;
  const qq=q.get('q');if(qq)curQ=qq;
}catch(e){}}
SB.auth.onAuthStateChange((ev,session)=>{ if(ev==='SIGNED_IN'||ev==='SIGNED_OUT'||ev==='USER_UPDATED'){ reloadAll().then(()=>{ if(ME.needProfile)openCompleteProfile(); }); } });
boot();
</script>
