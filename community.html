<style>
:root{
 --ink:#1F1A1C;--ink2:#574C50;--sub:#9C928E;--line:#ECE6E3;--line2:#F4EFEC;--soft:#F7F3F1;--tint:#FBF8F6;--pagebg:#F4F0ED;
 --rose:#B5828C;--plum:#6E4A50;--plum2:#5A3A40;--gold:#C98A3C;--rosebg:#FBEFF1;--plumbg:#F1ECEE;--goldbg:#F5EEE1;
 --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;--r1:8px;--r2:12px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html{overflow-x:hidden;}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--pagebg);color:var(--ink);line-height:1.55;overflow-x:hidden;font-size:14px;}
a{color:inherit;text-decoration:none;}
.tnum{font-variant-numeric:tabular-nums;}.muted{color:var(--sub);}
.btn{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r1);font-weight:700;font-size:13.5px;padding:9px 16px;display:inline-flex;align-items:center;gap:6px;transition:.12s;white-space:nowrap;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--plum);color:#fff;}.btn-primary:hover{background:var(--plum2);}
.btn-kakao{background:#FEE500;color:#3A1D1D;}
.btn-ghost{background:#fff;color:var(--plum);border:1px solid var(--line);}
.av{border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Georgia,serif;font-style:italic;font-weight:700;}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r2);}
.panel-h{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.5px;padding:14px var(--s4) 9px;}

/* header */
.hdr{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:60;}
.hwrap{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:var(--s6);height:60px;padding:0 var(--s6);}
.logo{flex:0 0 auto;display:flex;align-items:center;}
.logo img{height:26px;display:block;}
.gnav{display:flex;gap:var(--s5);}
.gnav a{font-size:14.5px;font-weight:600;color:var(--ink2);cursor:pointer;}
.gnav a.on{color:var(--plum);font-weight:800;}.gnav a:hover{color:var(--plum);}
.hsearch{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:8px 14px;width:210px;color:var(--sub);}
.hsearch input{flex:1;border:none;background:transparent;font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;}
.hright{display:flex;align-items:center;gap:var(--s3);flex:0 0 auto;}
.hright .av{width:34px;height:34px;font-size:14px;cursor:pointer;}
.langtog{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;font-size:12.5px;font-weight:800;}
.langtog span{padding:6px 11px;cursor:pointer;color:var(--sub);}
.langtog span.on{background:var(--plum);color:#fff;}
@media(max-width:900px){.gnav,.hsearch{display:none;}}

/* layout */
.wrap{max-width:1240px;margin:0 auto;display:grid;grid-template-columns:208px minmax(0,1fr) 300px;gap:var(--s5);padding:var(--s5) var(--s6) 60px;align-items:start;}
.col-side{position:sticky;top:76px;}
@media(max-width:1080px){.wrap{grid-template-columns:208px minmax(0,1fr);}.col-right{display:none;}}
@media(max-width:760px){.wrap{display:block;padding:var(--s4);}.col-left{display:none;}}

/* left nav */
.lnav{padding:var(--s2);}
.lnav .lh{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.5px;padding:10px 12px 6px;}
.lnav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r1);font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;}
.lnav a .ti{font-size:18px;color:var(--sub);width:19px;text-align:center;}
.lnav a .cnt{margin-left:auto;font-size:11.5px;color:var(--sub);font-weight:700;}
.lnav a:hover{background:var(--tint);}.lnav a.on{background:var(--plumbg);color:var(--plum);}.lnav a.on .ti{color:var(--plum);}
.lnav .div{height:1px;background:var(--line2);margin:8px 10px;}

/* board */
.board-top{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);background:#fff;border:1px solid var(--line);border-radius:var(--r2);padding:10px 12px;margin-bottom:var(--s4);}
.sorttabs{display:flex;gap:var(--s1);}
.stab{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--sub);padding:7px 13px;border-radius:20px;cursor:pointer;}
.stab .ti{font-size:16px;}.stab.on{background:var(--soft);color:var(--plum);}
.regsel{border:1px solid var(--line);border-radius:var(--r1);padding:8px 11px;font-family:inherit;font-size:13px;color:var(--ink2);background:#fff;outline:none;cursor:pointer;}
.boardhead{display:flex;align-items:baseline;gap:10px;padding:2px 4px var(--s3);}
.boardhead h1{font-size:19px;font-weight:800;letter-spacing:-.4px;}.boardhead .c{font-size:13px;color:var(--sub);}

.card{display:flex;background:#fff;border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.card:hover{border-color:#E0D4CF;box-shadow:0 6px 18px -12px rgba(90,60,66,.4);}
.vote{flex:0 0 52px;background:var(--tint);border-right:1px solid var(--line2);display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 0;}
.vote .vb{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:.12s;}
.vote .vb:hover{background:var(--rosebg);color:var(--rose);}.vote .vb .ti{font-size:19px;}
.vote .vn{font-size:13px;font-weight:800;color:var(--ink2);}
.vote.liked .vb{color:var(--rose);}.vote.liked .vn{color:var(--rose);}
.cbody{flex:1;min-width:0;padding:13px var(--s4) 12px;}
.chead{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);flex-wrap:wrap;}
.chead .av{width:20px;height:20px;font-size:10px;}
.chead .cat{font-weight:800;color:var(--rose);}
.rbadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;}
.rb-guest{background:var(--rosebg);color:#9A5E6A;}.rb-owner{background:var(--plumbg);color:var(--plum);}.rb-official{background:var(--goldbg);color:#9A7B3C;}
.chead .dot{width:2px;height:2px;border-radius:50%;background:var(--sub);opacity:.6;}
.ctitle{font-size:16px;font-weight:700;margin-top:7px;letter-spacing:-.3px;line-height:1.4;}
.cexc{font-size:13.5px;color:var(--ink2);margin-top:5px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cmedia{display:grid;gap:4px;margin-top:11px;border-radius:var(--r1);overflow:hidden;}
.cmedia.one{grid-template-columns:1fr;}.cmedia.g2{grid-template-columns:1fr 1fr;}.cmedia.g3{grid-template-columns:1.7fr 1fr 1fr;}
.cmedia .mi{background-size:cover;background-position:center;height:128px;position:relative;background-color:var(--soft);}
.cmedia.one .mi{height:240px;}
.cmedia .more{position:absolute;inset:0;background:rgba(20,12,15,.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;}
.ctags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.ctag{font-size:11.5px;font-weight:600;color:var(--plum);background:var(--plumbg);padding:3px 9px;border-radius:6px;}
.dtags{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px;}
.dtag{font-size:12.5px;font-weight:600;color:var(--plum);background:var(--plumbg);padding:5px 12px;border-radius:7px;}
.charcount{font-size:11px;color:var(--sub);text-align:right;margin-top:4px;}
/* retention */
.newdot{font-size:9px;font-weight:800;color:#fff;background:var(--rose);padding:1px 5px;border-radius:4px;letter-spacing:.3px;}
.card.read .ctitle{color:var(--sub);}
.card.read .vote{opacity:.8;}
.streak{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#FFF4E8,#FBEFF1);border:1px solid var(--line);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;}
.streak .fire{font-size:26px;line-height:1;}
.streak .sn{font-size:15px;font-weight:800;color:var(--plum);}
.streak .sl{font-size:11.5px;color:var(--ink2);margin-top:2px;}
.related{margin-top:var(--s6);padding-top:var(--s5);border-top:1px solid var(--line);}
.related h4{font-size:15px;font-weight:800;margin-bottom:6px;}
.rel{display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid var(--line2);cursor:pointer;}
.rel:first-of-type{border-top:none;}
.rel:hover .rt{color:var(--plum);}
.rel .rt{flex:1;font-size:14.5px;font-weight:600;line-height:1.4;}
.rel .rm{font-size:11.5px;color:var(--sub);margin-top:3px;font-weight:500;}
.rel .rc{font-size:12.5px;color:var(--sub);white-space:nowrap;font-weight:600;}
.fab{position:fixed;right:24px;bottom:24px;z-index:80;width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 10px 24px -8px rgba(90,60,66,.5);display:none;align-items:center;justify-content:center;color:var(--plum);cursor:pointer;}
.fab.on{display:flex;}.fab .ti{font-size:22px;}
.cact{display:flex;gap:var(--s5);margin-top:11px;font-size:12.5px;color:var(--sub);font-weight:600;}
.cact .a{display:flex;align-items:center;gap:5px;}.cact .ti{font-size:16px;}
.empty{text-align:center;color:var(--sub);font-size:14px;padding:70px 20px;background:#fff;border:1px solid var(--line);border-radius:var(--r2);}
/* promo banner */
.promo{position:relative;height:152px;border-radius:var(--r2);overflow:hidden;margin-bottom:var(--s4);border:1px solid var(--line);}
.promo .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 28px;color:#fff;opacity:0;transition:opacity .5s;cursor:pointer;pointer-events:none;}
.promo .slide.on{opacity:1;pointer-events:auto;}
.promo .pbadge{align-self:flex-start;font-size:10.5px;font-weight:800;letter-spacing:1px;background:rgba(255,255,255,.22);padding:4px 10px;border-radius:20px;}
.promo h3{font-size:21px;font-weight:800;margin-top:10px;letter-spacing:-.3px;}
.promo p{font-size:13px;margin-top:6px;opacity:.92;max-width:78%;line-height:1.5;}
.promo .dots{position:absolute;bottom:12px;right:16px;display:flex;gap:6px;z-index:3;}
.promo .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s;}
.promo .dots i.on{background:#fff;width:18px;border-radius:4px;}
/* info curation strip */
.infosec{margin-bottom:var(--s5);}
.infosec .ih{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.infosec .ih h3{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.infosec .ih a{font-size:12.5px;color:var(--sub);cursor:pointer;font-weight:600;}
.iscroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.iscroll::-webkit-scrollbar{height:0;}
.icard{flex:0 0 196px;background:#fff;border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:.12s;}
.icard:hover{border-color:#E0D4CF;box-shadow:0 6px 16px -12px rgba(90,60,66,.4);}
.icard .ith{height:104px;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);}
.icard .ith .ti{font-size:30px;}
.icard .ib{padding:10px 12px 12px;}
.icard .iflag{font-size:11px;color:var(--sub);font-weight:600;}
.icard .it{font-size:13.5px;font-weight:700;line-height:1.4;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* right */
.about{padding:var(--s4);}
.about .tt{font-family:Georgia,serif;font-style:italic;font-size:18px;color:var(--plum);}
.about .ds{font-size:12.5px;color:var(--ink2);margin-top:7px;line-height:1.6;}
.about .st{display:flex;margin-top:14px;text-align:center;border-top:1px solid var(--line2);padding-top:13px;}
.about .st .c{flex:1;}.about .st .n{font-size:16px;font-weight:800;color:var(--plum);}.about .st .l{font-size:10.5px;color:var(--sub);margin-top:2px;}
.about .btn{margin-top:14px;width:100%;justify-content:center;}
.rules{padding:6px var(--s4) var(--s4);}
.rule{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line2);font-size:13px;color:var(--ink2);line-height:1.5;}
.rule:first-child{border-top:none;}.rule .rn{font-weight:800;color:var(--rose);flex:0 0 auto;}
.hot{padding:var(--s1) 6px var(--s2);}
.hotitem{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-radius:var(--r1);cursor:pointer;}
.hotitem:hover{background:var(--tint);}
.hotitem .rk{font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:14px;color:var(--rose);width:14px;flex:0 0 auto;text-align:center;}
.hotitem .ht{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hotitem .hm{font-size:11px;color:var(--sub);margin-top:2px;}
.ctabox{background:linear-gradient(160deg,#6E4A50,#52323A);color:#F3DCE2;border-radius:var(--r2);padding:var(--s5);}
.ctabox h4{color:#fff;font-size:15px;font-weight:800;}.ctabox p{font-size:12.5px;margin-top:7px;color:#E4C2CC;line-height:1.6;}
.ctabox .btn{margin-top:13px;width:100%;justify-content:center;}

/* detail */
.detail{background:#fff;border:1px solid var(--line);border-radius:var(--r2);padding:var(--s6) var(--s8);}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--plum);cursor:pointer;margin-bottom:var(--s5);}
.dhead{display:flex;align-items:center;gap:11px;}
.dhead .av{width:42px;height:42px;font-size:16px;}
.dhn{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;}.dhm{font-size:12px;color:var(--sub);margin-top:2px;}
.dtitle{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.35;margin-top:18px;}
.dmeta{display:flex;gap:14px;font-size:12px;color:var(--sub);margin-top:10px;}
.dmeta .a{display:flex;align-items:center;gap:5px;}.dmeta .ti{font-size:15px;}
.dcontent{font-size:15.5px;line-height:1.85;color:var(--ink);margin-top:16px;white-space:pre-wrap;word-break:break-word;}
.dgallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:16px;}
.dgallery img{width:100%;border-radius:var(--r1);border:1px solid var(--line2);cursor:zoom-in;display:block;}
.transbox{margin-top:16px;background:var(--soft);border:1px solid var(--line2);border-radius:var(--r1);padding:13px 15px;}
.transbox .lbl{font-size:11px;font-weight:800;color:var(--plum);letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
.transbox .orig{font-size:14px;color:var(--ink2);line-height:1.8;margin-top:9px;display:none;white-space:pre-wrap;}
.transbox .tg{font-size:12px;color:var(--rose);font-weight:700;cursor:pointer;margin-top:9px;display:inline-block;}
.proof{display:flex;gap:9px;margin-top:var(--s6);padding-top:var(--s4);border-top:1px solid var(--line);}
.pf{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:var(--r1);padding:9px 16px;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;transition:.12s;}
.pf:hover{background:var(--tint);}.pf.on{background:var(--rosebg);border-color:transparent;color:var(--rose);}.pf.on.scrap{background:var(--plumbg);color:var(--plum);}.pf .ti{font-size:17px;}
.csec{margin-top:var(--s6);}.csec h4{font-size:15px;font-weight:800;margin-bottom:8px;}
.cwrite{display:flex;gap:9px;margin:12px 0 8px;}
.cwrite input{flex:1;border:1px solid var(--line);background:var(--soft);border-radius:var(--r1);padding:12px 15px;font-family:inherit;font-size:14px;outline:none;}
.cmt{display:flex;gap:11px;padding:15px 0;border-top:1px solid var(--line2);}
.cmt .av{width:34px;height:34px;font-size:13px;}.cmt .cn{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}

/* ===== render ===== */
function renderHeader(){
  $('hwrap').innerHTML=`<a class="logo" href="community.html"><img src="logo-trim.png" alt="Beautia"></a>
    <nav class="gnav"><a class="on">${t('community')}</a><a href="landing.html">${t('intro')}</a><a href="https://pf.kakao.com/_xhxhixfX/chat" target="_blank">${t('reserve')}</a></nav>
    <div class="hsearch"><i class="ti ti-search"></i><input id="q" placeholder="${t('search')}" onkeydown="if(event.key==='Enter')doSearch()"></div>
    <div class="hright">
      <div class="langtog"><span class="${LANG==='ko'?'on':''}" onclick="setLang('ko')">한</span><span class="${LANG==='ja'?'on':''}" onclick="setLang('ja')">日</span></div>
      <button class="btn btn-primary" onclick="openWrite()"><i class="ti ti-pencil"></i> ${t('write')}</button>
      <div class="av" id="navAv" onclick="openProf()"></div>
    </div>`;
  applyAv($('navAv'),ME.nick);
}
function renderRight(){
  $('rightcol').innerHTML=`
    <div class="streak"><span class="fire">🔥</span><div><div class="sn tnum">${ME.visit.streak}${t('dayUnit')} ${t('streakLabel')}</div><div class="sl">${t('streakSub')}</div></div></div>
    <div class="panel about">
      <div class="tt">${t('about')}</div><div class="ds">${t('aboutDesc')}</div>
      <div class="st"><div class="c"><div class="n tnum">1.2k</div><div class="l">${t('members')}</div></div><div class="c"><div class="n tnum">${DB.posts.length}</div><div class="l">${t('posts')}</div></div><div class="c"><div class="n tnum">340</div><div class="l">${t('visits')}</div></div></div>
      <button class="btn btn-primary" onclick="openWrite()"><i class="ti ti-pencil"></i> ${t('write')}</button>
    </div>
    <div class="panel"><div class="panel-h">📋 ${t('rules')}</div><div class="rules">
      ${[1,2,3,4].map(n=>`<div class="rule"><span class="rn">${n}</span><span>${t('r'+n)}</span></div>`).join('')}
    </div></div>
    <div class="panel"><div class="panel-h">🔥 ${t('popular')}</div><div class="hot" id="hot"></div></div>
    <div class="ctabox"><h4>${t('ctaTitle')}</h4><p>${t('ctaDesc')}</p><a class="btn btn-kakao" href="https://pf.kakao.com/_xhxhixfX/chat" target="_blank">💬 ${t('ctaBtn')}</a></div>`;
  const hot=DB.posts.slice().sort((a,b)=>(b.like+b.scrap*2)-(a.like+a.scrap*2)).slice(0,5);
  $('hot').innerHTML=hot.map((p,i)=>`<div class="hotitem" onclick="openPost(${p.id})"><span class="rk">${i+1}</span><div><div class="ht">${esc(p.title)}</div><div class="hm tnum">❤ ${p.like} · 💬 ${p.cmts.length}</div></div></div>`).join('');
}
function renderShell(){
  let nav=`<div class="lh">${t('board')}</div>`;
  nav+=CATS.map(([c,ic])=>`<a class="${curMenu===''&&c===curCat?'on':''}" onclick="setCat('${c}')"><i class="ti ${ic}"></i>${catL(c)}<span class="cnt tnum">${c==='전체'?DB.posts.length:DB.posts.filter(p=>p.cat===c).length}</span></a>`).join('');
  nav+=`<div class="div"></div><div class="lh">${t('region')}</div>`;
  nav+=`<a class="${curRegion==='전체'?'on':''}" onclick="setRegion('전체')"><i class="ti ti-world"></i>${t('allRegion')}</a>`;
  nav+=RGROUPS.map(g=>g[1].map(r=>`<a class="${curRegion===r?'on':''}" onclick="setRegion('${r}')"><i class="ti ti-map-pin"></i>${t(g[0]+'Short')} ${regL(r)}<span class="cnt tnum">${DB.posts.filter(p=>p.region===r).length||''}</span></a>`).join('')).join('');
  nav+=`<div class="div"></div><div class="lh">${t('myMenu')}</div>`;
  nav+=`<a class="${curMenu==='mine'?'on':''}" onclick="setMenu('mine')"><i class="ti ti-user-edit"></i>${t('myPosts')}</a>`;
  nav+=`<a class="${curMenu==='scrap'?'on':''}" onclick="setMenu('scrap')"><i class="ti ti-bookmark"></i>${t('scrap')}</a>`;
  $('lnav').innerHTML=nav;
  renderRight();
}
function setCat(c){curCat=c;curMenu='';view='feed';renderShell();renderMain();scrollTo({top:0});}
function setRegion(r){curRegion=r;curMenu='';view='feed';renderShell();renderMain();scrollTo({top:0});}
function setMenu(m){curMenu=m;view='feed';renderShell();renderMain();scrollTo({top:0});}
function doSearch(){curQ=$('q').value.trim();curCat='전체';curMenu='';view='feed';renderShell();renderMain();}
function setSort(s){curSort=s;renderMain();}
function setLang(l){LANG=l;localStorage.setItem('beautia_lang',l);document.documentElement.lang=l;renderHeader();renderShell();if(view==='detail')renderDetail();else renderMain();}

function visible(){let p=DB.posts.slice();
  if(curMenu==='mine')p=p.filter(x=>x.mine);
  else if(curMenu==='scrap')p=p.filter(x=>ME.scraps.includes(x.id));
  else{if(curCat!=='전체')p=p.filter(x=>x.cat===curCat);if(curRegion!=='전체')p=p.filter(x=>x.region===curRegion||x.region==='전체');if(curQ)p=p.filter(x=>(x.title+x.content+x.nick).toLowerCase().includes(curQ.toLowerCase()));}
  if(curSort==='hot')p.sort((a,b)=>(b.like+b.scrap*2)-(a.like+a.scrap*2));else if(curSort==='cmt')p.sort((a,b)=>b.cmts.length-a.cmts.length);else p.sort((a,b)=>b.t-a.t);
  return p;}
function bodyOf(p){return (LANG==='ja'&&p.orig)?p.orig:p.content;}
function mediaHtml(imgs){if(!imgs||!imgs.length)return'';
  if(imgs.length===1)return `<div class="cmedia one"><div class="mi" style="background-image:url('${imgs[0]}')"></div></div>`;
  const cls=imgs.length===2?'g2':'g3';const show=imgs.slice(0,3);
  return `<div class="cmedia ${cls}">${show.map((s,i)=>`<div class="mi" style="background-image:url('${s}')">${(i===2&&imgs.length>3)?`<span class="more">+${imgs.length-3}</span>`:''}</div>`).join('')}</div>`;}
function cardHtml(p){const liked=ME.likes.includes(p.id);
  return `<div class="card ${ME.read.includes(p.id)?'read':''}" onclick="openPost(${p.id})">
    <div class="vote ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike(${p.id})"><div class="vb"><i class="ti ti-heart${liked?'-filled':''}"></i></div><div class="vn tnum">${p.like}</div></div>
    <div class="cbody">
      <div class="chead">${avHtml(p.nick)}<span class="cat">${catL(p.cat)}</span> ${roleBadge(p.role)}<span class="dot"></span><span>${esc(p.nick)}</span>${p.region&&p.region!=='전체'?`<span class="dot"></span><span>${regFlag(p.region)} ${esc(regL(p.region))}</span>`:''}<span class="dot"></span><span>${timeago(p.t)}</span>${isNew(p)?' <span class="newdot">NEW</span>':''}</div>
      <div class="ctitle">${esc(p.title)}</div>
      <div class="cexc">${esc(bodyOf(p))}</div>
      ${mediaHtml(p.imgs)}
      ${(p.tags&&p.tags.length)?`<div class="ctags">${p.tags.slice(0,4).map(tg=>`<span class="ctag">#${esc(tg)}</span>`).join('')}</div>`:''}
      <div class="cact"><span class="a"><i class="ti ti-message-circle"></i> ${p.cmts.length}</span><span class="a"><i class="ti ti-bookmark"></i> ${p.scrap}</span><span class="a"><i class="ti ti-eye"></i> ${(p.like*7+p.scrap*3+13)}</span></div>
    </div></div>`;}
function regOptions(){return `<option value="전체">📍 ${t('allRegion')}</option>`+RGROUPS.map(g=>`<optgroup label="${t(g[0]+'Group')}">`+g[1].map(r=>`<option value="${r}" ${r===curRegion?'selected':''}>${regL(r)}</option>`).join('')+'</optgroup>').join('');}
function headTitle(){if(curMenu==='mine')return t('myPosts');if(curMenu==='scrap')return t('scrap');if(curQ)return`"${esc(curQ)}"`;if(curRegion!=='전체')return (curCat==='전체'?t('allPosts'):catL(curCat))+' · '+regFlag(curRegion)+' '+regL(curRegion);return curCat==='전체'?t('allPosts'):catL(curCat);}
let promoTimer=null,promoIdx=0;
function bannerHtml(){return `<div class="promo">${BANNERS.map((b,i)=>`<div class="slide ${i===promoIdx?'on':''}" style="background:${b.bg}" onclick="${b.act}"><span class="pbadge">${b.badge}</span><h3>${esc(b[LANG].title)}</h3><p>${esc(b[LANG].sub)}</p></div>`).join('')}<div class="dots">${BANNERS.map((b,i)=>`<i class="${i===promoIdx?'on':''}" onclick="event.stopPropagation();promoGo(${i})"></i>`).join('')}</div></div>`;}
function showPromo(){const sl=document.querySelectorAll('.promo .slide'),dt=document.querySelectorAll('.promo .dots i');sl.forEach((s,i)=>s.classList.toggle('on',i===promoIdx));dt.forEach((d,i)=>d.classList.toggle('on',i===promoIdx));}
function startPromo(){clearInterval(promoTimer);if(document.querySelectorAll('.promo .slide').length<2)return;promoTimer=setInterval(()=>{promoIdx=(promoIdx+1)%BANNERS.length;showPromo();},4500);}
function promoGo(i){promoIdx=i;showPromo();startPromo();}
function infoStripHtml(){const info=DB.posts.filter(p=>p.cat==='정보').sort((a,b)=>b.t-a.t).slice(0,8);if(!info.length)return'';
  return `<div class="infosec"><div class="ih"><h3>${t('infoTitle')}</h3><a onclick="setCat('정보')">${t('seeAll')} ›</a></div><div class="iscroll">${info.map(p=>{const g=GRAD[hash(p.title)%GRAD.length];const has=p.imgs&&p.imgs.length;const th=has?`background-image:url('${p.imgs[0]}')`:`background:linear-gradient(135deg,${g[0]},${g[1]})`;return `<div class="icard" onclick="openPost(${p.id})"><div class="ith" style="${th}">${has?'':'<i class="ti ti-bulb"></i>'}</div><div class="ib"><div class="iflag">${p.region&&p.region!=='전체'?regFlag(p.region)+' '+esc(regL(p.region)):'🗾 '+catL('정보')}</div><div class="it">${esc(p.title)}</div></div></div>`;}).join('')}</div></div>`;}
function renderMain(){
  if(view==='detail'){renderDetail();return;}
  const list=visible();
  const showTop=curMenu===''&&!curQ;
  const home=showTop&&curCat==='전체'&&curRegion==='전체';
  $('main').innerHTML=(showTop?bannerHtml():'')+(home?infoStripHtml():'')+`
    <div class="board-top">
      <div class="sorttabs">
        <span class="stab ${curSort==='hot'?'on':''}" onclick="setSort('hot')"><i class="ti ti-flame"></i>${t('hot')}</span>
        <span class="stab ${curSort==='new'?'on':''}" onclick="setSort('new')"><i class="ti ti-clock"></i>${t('new')}</span>
        <span class="stab ${curSort==='cmt'?'on':''}" onclick="setSort('cmt')"><i class="ti ti-message-2"></i>${t('cmtSort')}</span>
      </div>
      <select class="regsel" onchange="setRegion(this.value)">${regOptions()}</select>
    </div>
    <div class="boardhead"><h1>${headTitle()}</h1><span class="c tnum">${list.length}${t('count')}</span>${(function(){const n=list.filter(isNew).length;return n?`<span class="c" style="color:var(--rose);font-weight:700">· ${t('todayNew')} ${n}</span>`:'';})()}</div>
    ${list.length?list.map(cardHtml).join(''):`<div class="empty">${t('emptyFeed')}</div>`}`;
  startPromo();
}
function openPost(id){openId=id;if(!ME.read.includes(id)){ME.read.push(id);saveMe();}view='detail';renderDetail();scrollTo({top:0});}
function renderDetail(){
  clearInterval(promoTimer);
  const p=DB.posts.find(x=>x.id===openId);if(!p){view='feed';renderMain();return;}
  const liked=ME.likes.includes(p.id),scrapped=ME.scraps.includes(p.id);
  const main=bodyOf(p);const alt=(LANG==='ja'&&p.orig)?p.content:p.orig;const altLbl=(LANG==='ja')?t('viewOrigKo'):t('viewOrigJa');
  const gallery=(p.imgs&&p.imgs.length)?`<div class="dgallery">${p.imgs.map(s=>`<img src="${s}" onclick="lightbox('${s}')">`).join('')}</div>`:'';
  $('main').innerHTML=`<div class="detail">
    <div class="back" onclick="backFeed()"><i class="ti ti-chevron-left"></i> ${t('back')}</div>
    <div class="dhead">${avHtml(p.nick)}<div><div class="dhn">${esc(p.nick)} ${roleBadge(p.role)}</div><div class="dhm"><span style="color:var(--rose);font-weight:700;">${catL(p.cat)}</span>${p.region&&p.region!=='전체'?' · '+regFlag(p.region)+' '+esc(regL(p.region)):''} · ${timeago(p.t)}</div></div></div>
    <div class="dtitle">${esc(p.title)}</div>
    <div class="dmeta"><span class="a"><i class="ti ti-heart"></i> ${p.like}</span><span class="a"><i class="ti ti-message-circle"></i> ${p.cmts.length}</span><span class="a"><i class="ti ti-eye"></i> ${(p.like*7+p.scrap*3+13)} ${t('views')}</span></div>
    <div class="dcontent">${esc(main)}</div>
    ${gallery}
    ${(p.tags&&p.tags.length)?`<div class="dtags">${p.tags.map(tg=>`<span class="dtag">#${esc(tg)}</span>`).join('')}</div>`:''}
    ${alt?`<div class="transbox"><div class="lbl"><i class="ti ti-language"></i> ${t('transBy')}</div><div class="orig" id="origText">${esc(alt)}</div><span class="tg" onclick="toggleOrig(event)">${altLbl}</span></div>`:''}
    <div class="proof">
      <div class="pf ${liked?'on':''}" onclick="toggleLike(${p.id})"><i class="ti ti-heart${liked?'-filled':''}"></i> ${t('likeBtn')} <span class="tnum">${p.like}</span></div>
      <div class="pf scrap ${scrapped?'on':''}" onclick="toggleScrap(${p.id})"><i class="ti ti-bookmark${scrapped?'-filled':''}"></i> ${t('scrapBtn')} <span class="tnum">${p.scrap}</span></div>
      <div class="pf" onclick="toast(t('copied'))"><i class="ti ti-share-2"></i> ${t('shareBtn')}</div>
    </div>
    <div class="csec"><h4>${t('comments')} ${p.cmts.length}</h4>
      <div class="cwrite"><input id="cInput" placeholder="${t('cmtPh')}" maxlength="500" onkeydown="if(event.key==='Enter')addComment()"><button class="btn btn-primary" onclick="addComment()">${t('submit')}</button></div>
      ${p.cmts.length?p.cmts.map(c=>`<div class="cmt">${avHtml(c.nick)}<div><div class="cn">${esc(c.nick)} ${roleBadge(c.role)}</div><div class="ct">${esc(c.t)}</div><div class="cd">${timeago(c.d)}</div></div></div>`).join(''):`<div class="empty" style="border:none;padding:24px 0;">${t('firstCmt')}</div>`}
    </div>
    ${relatedHtml(p)}
    </div>`;
}
function relatedHtml(p){
  const same=DB.posts.filter(x=>x.id!==p.id&&x.cat===p.cat);
  const more=DB.posts.filter(x=>x.id!==p.id&&x.cat!==p.cat).sort((a,b)=>(b.like+b.scrap*2)-(a.like+a.scrap*2));
  const list=[...same,...more].slice(0,4);if(!list.length)return'';
  return `<div class="related"><h4>${t('related')}</h4>${list.map(r=>`<div class="rel" onclick="openPost(${r.id})"><div style="flex:1;min-width:0"><div class="rt">${esc(r.title)}</div><div class="rm">${catL(r.cat)}${r.region&&r.region!=='전체'?' · '+regFlag(r.region)+' '+esc(regL(r.region)):''} · 💬 ${r.cmts.length}</div></div><div class="rc">❤ ${r.like}</div></div>`).join('')}</div>`;
}
function backFeed(){view='feed';renderMain();scrollTo({top:0});}
function toggleOrig(e){const o=$('origText');const sh=o.style.display!=='block';o.style.display=sh?'block':'none';e.target.textContent=sh?t('foldOrig'):(LANG==='ja'?t('viewOrigKo'):t('viewOrigJa'));}
function toggleLike(id){const p=DB.posts.find(x=>x.id===id);const i=ME.likes.indexOf(id);if(i<0){ME.likes.push(id);p.like++;}else{ME.likes.splice(i,1);p.like--;}saveMe();save();if(view==='detail')renderDetail();else renderMain();renderRight();}
function toggleScrap(id){const p=DB.posts.find(x=>x.id===id);const i=ME.scraps.indexOf(id);if(i<0){ME.scraps.push(id);p.scrap++;toast(t('scrapped'));}else{ME.scraps.splice(i,1);p.scrap--;}saveMe();save();if(view==='detail')renderDetail();}
function addComment(){const v=$('cInput').value.trim();if(!v)return;const p=DB.posts.find(x=>x.id===openId);p.cmts.push({nick:ME.nick,role:ME.role,t:v,d:Date.now()});save();renderDetail();renderRight();}

/* write + image upload */
let wCat='질문',wRegion='전체',wImgs=[];
function cc(id,out,max){$(out).textContent=$(id).value.length+'/'+max;}
function openWrite(){wCat='질문';wRegion='전체';wImgs=[];$('wHead').textContent=t('wHead');$('wlCat').textContent=t('category');$('wlReg').textContent=t('regionOpt');$('wlTags').textContent=t('tags');$('wlPhoto').textContent=t('photo');$('wTitle').placeholder=t('titlePh');$('wContent').placeholder=t('contentPh');$('wTags').placeholder=t('tagsPh');$('wSubmit').textContent=t('register');$('wTitle').value='';$('wContent').value='';$('wTags').value='';$('ccT').textContent='0/120';$('ccC').textContent='0/5000';renderWriteForm();renderPtiles();$('writeModal').classList.add('on');}
function renderWriteForm(){
  $('wcats').innerHTML=CATS.filter(([c])=>c!=='전체').map(([c])=>`<div class="wchip ${c===wCat?'on':''}" onclick="wPick('cat','${c}')">${catL(c)}</div>`).join('');
  let html=`<div class="wrow"><span class="wchip ${wRegion==='전체'?'on':''}" onclick="wPick('region','전체')">${t('noRegion')}</span></div>`;
  html+=RGROUPS.map(g=>`<div class="wrow"><span class="wgl">${t(g[0]+'Group')}</span>`+g[1].map(r=>`<span class="wchip ${r===wRegion?'on':''}" onclick="wPick('region','${r}')">${regL(r)}</span>`).join('')+`</div>`).join('');
  $('wregions').innerHTML=html;
}
function wPick(k,v){if(k==='cat')wCat=v;else wRegion=v;renderWriteForm();}
function renderPtiles(){let h=wImgs.map((s,i)=>`<div class="ptile" style="background-image:url('${s}')"><div class="rm" onclick="rmImg(${i})">×</div></div>`).join('');if(wImgs.length<4)h+=`<div class="ptile add" onclick="$('wFile').click()"><i class="ti ti-camera-plus"></i></div>`;$('ptiles').innerHTML=h;}
function rmImg(i){wImgs.splice(i,1);renderPtiles();}
function onPick(e){const files=[...e.target.files].slice(0,4-wImgs.length);files.forEach(f=>downscale(f,u=>{wImgs.push(u);renderPtiles();}));e.target.value='';}
function downscale(file,cb){const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const max=900;let w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cb(cv.toDataURL('image/jpeg',0.8));};img.src=ev.target.result;};r.readAsDataURL(file);}
function submitWrite(){const title=$('wTitle').value.trim(),content=$('wContent').value.trim();if(!title||!content){toast(t('needTC'));return;}
  const tags=$('wTags').value.split(/[,#\n]+/).map(s=>s.trim()).filter(Boolean).slice(0,6);
  DB.seq++;DB.posts.unshift({id:DB.seq,cat:wCat,region:wRegion,role:ME.role,nick:ME.nick,title,content,tags,like:0,scrap:0,imgs:wImgs.slice(),cmts:[],t:Date.now(),mine:true});
  save();closeModal();curCat='전체';curMenu='';curSort='new';curQ='';view='feed';renderShell();renderMain();scrollTo({top:0});toast(t('posted'));}

let pfRole=null;
function openProf(){$('pHead').textContent=t('profile');$('pfL').textContent=t('iam');$('pfNick').placeholder=t('nickPh');$('pSave').textContent=t('save');$('pfNick').value=ME.nick;pfRole=ME.role;renderPfRoles();$('profModal').classList.add('on');}
function renderPfRoles(){$('pfRoles').innerHTML=ROLES.filter(r=>r.k!=='official').map(r=>`<div class="wchip ${r.k===pfRole?'on':''}" onclick="pickRole('${r.k}')">${roleL(r.k)}</div>`).join('');}
function pickRole(k){pfRole=k;renderPfRoles();}
function saveProfile(){const n=$('pfNick').value.trim();if(n)ME.nick=n;if(pfRole)ME.role=pfRole;saveMe();closeModal();renderHeader();renderShell();if(view==='detail')renderDetail();else renderMain();toast(t('saved'));}
function closeModal(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on'));}
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal();}));

document.documentElement.lang=LANG;
load();renderHeader();renderShell();renderMain();
window.addEventListener('scroll',()=>{$('fab').classList.toggle('on',window.scrollY>500);});
if(ME._firstEver)setTimeout(()=>toast(t('welcome')),700);
else if(ME._newVisit&&ME.visit.streak>1)setTimeout(()=>toast('🔥 '+ME.visit.streak+t('dayUnit')+' '+t('streakLabel')+'!'),700);
</script>
