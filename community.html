.tile .tfeat i{font-size:13px;}

function syncSaveBtns(w,on){
 document.querySelectorAll('.heart,.wheart,.cbtn.save').forEach(function(btn){
  if((btn.getAttribute('onclick')||'').indexOf("toggleSave('"+w+"'")<0)return;
  btn.classList.toggle('on',on);
  var ic=btn.querySelector('i');if(ic)ic.className='ti ti-heart'+(on?'-filled':'');
  var sp=btn.querySelector('span');if(sp&&btn.classList.contains('save'))sp.textContent=on?T[LANG].saved2:T[LANG].save;
 });
}
function toggleSave(w,ev){if(ev){ev.stopPropagation();ev.preventDefault();}
 const i=SAVED.indexOf(w),nowOn=i<0;
 if(nowOn)SAVED.push(w);else SAVED.splice(i,1);
 syncSaveBtns(w,nowOn);                 // ← 즉시 시각 반영
 toast(nowOn?T[LANG].saveT:T[LANG].unsaveT);
 saveLocal();                           // 항상 로컬 저장(테이블 없어도 찜 유지)
 if(ME&&ME.uid){try{if(nowOn)SB.from('saves').upsert({user_id:ME.uid,wid:w}).then(function(){},function(){});else SB.from('saves').delete().eq('user_id',ME.uid).eq('wid',w).then(function(){},function(){});}catch(e){}}

}

// 나라 국기: shop.country(KR/JP/…) 우선, 없으면 지역·주소 텍스트로 판별
function flagFor(country,region,area){
  var c=String(country||'').toUpperCase();
  if(c==='KR')return '🇰🇷';if(c==='JP')return '🇯🇵';if(c==='US')return '🇺🇸';if(c==='TH')return '🇹🇭';if(c==='VN')return '🇻🇳';
  var r=String(region||'')+' '+String(area||'');
  if(/大阪|大坂|東京|京都|福岡|札幌|名古屋|osaka|tokyo|kyoto|fukuoka|일본|japan|オオサカ|오사카|도쿄|교토|후쿠오카|삿포로|나고야/i.test(r))return '🇯🇵';
  if(/[가-힣]/.test(r)||/korea|seoul|busan|daegu|incheon|gwangju|gimpo|bundang|seongnam/i.test(r))return '🇰🇷';
  if(/thai|bangkok|방콕|태국/i.test(r))return '🇹🇭';
  return '🌎';
}

const CITY_COORDS={Tokyo:[35.68,139.69],Osaka:[34.69,135.5],Fukuoka:[33.59,130.4],Seoul:[37.57,126.98],'New York':[40.71,-74.0],Paris:[48.86,2.35],London:[51.51,-0.13]};
let USERLOC=null;
function haversine(a,b){var R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180,la1=a[0]*Math.PI/180,la2=b[0]*Math.PI/180;var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);return 2*R*Math.asin(Math.sqrt(x));}
function distOf(city){if(!USERLOC)return 0;var c=CITY_COORDS[city];if(!c)return 9e9;return haversine([USERLOC.lat,USERLOC.lng],c);}

  var cuts=el.querySelectorAll('.ic-cut'),saved=[];
  cuts.forEach(function(c,i){saved[i]=c.style.height;c.style.height=c.offsetWidth+'px';});
  function restore(){if(iw)iw.style.transform=t;cuts.forEach(function(c,i){c.style.height=saved[i];});}

function composeOgCard(cv){

function addPfPhotos(e){const files=Array.prototype.slice.call(e.target.files);const room=12-(ME.works||[]).length;files.slice(0,room).forEach(function(f){if(!/^image\//.test(f.type))return;const r=new FileReader();r.onload=function(ev){pfDownscale(ev.target.result,1000,async function(d){const url=await uploadOne(d);ME.works=ME.works||[];ME.works.push({img:url,text:''});renderPf();buildTiles();render();await persistShop();});};r.readAsDataURL(f);});e.target.value='';}
function pfSetCaption(i,val){if(!ME||!ME.works||!ME.works[i])return;var w=ME.works[i];if(typeof w!=='object')w=ME.works[i]={img:w,text:''};w.text=(val||'').slice(0,600);buildTiles();render();persistShop();}
function delPfPhoto(i){ME.works.splice(i,1);renderPf();buildTiles();render();persistShop();}

async function submitDesignerApply(){daSync();

let CHATS=[],curConv=null,chatSub=null,PROFCACHE={};

function otherUid(c){return c.customer===ME.uid?c.designer:c.customer;}
async function ensureLoginC(){if(ME&&ME.uid)return true;openLogin('');return false;}
async function fetchProfiles(ids){var need=ids.filter(function(x){return x&&!PROFCACHE[x];});if(need.length){try{var d=(await SB.from('profiles').select('id,nickname,shop').in('id',need)).data||[];d.forEach(function(p){PROFCACHE[p.id]={name:p.nickname||(p.shop&&p.shop.name)||'User',avatar:(p.shop&&p.shop.avatar)||''};});}catch(e){}}need.forEach(function(x){if(!PROFCACHE[x])PROFCACHE[x]={name:'User',avatar:''};});}
async function openChat(){if(!(await ensureLoginC()))return;curConv=null;await loadConvos();$('chatmodal').classList.add('on');var mt=document.getElementById('tbMsg');if(mt)mt.classList.add('on');markChatSeen();}
function closeChat(){if(chatSub){try{SB.removeChannel(chatSub);}catch(e){}chatSub=null;}$('chatmodal').classList.remove('on');curConv=null;var mt=document.getElementById('tbMsg');if(mt)mt.classList.remove('on');}
// 안 읽음 배지
let chatUnread=0,chatGlobalSub=null;
function chatSeenTs(){return parseInt(localStorage.getItem('beautia_chat_seen')||'0',10)||0;}
function markChatSeen(){try{localStorage.setItem('beautia_chat_seen',''+Date.now());}catch(e){}chatUnread=0;renderChatBadge();}
function renderChatBadge(){var has=chatUnread>0||bkPend>0;var a=$('avatar');if(a){var b=a.querySelector('.unread');if(has){if(!b){b=document.createElement('span');b.className='unread';a.appendChild(b);}}else if(b){b.remove();}}
 var t=document.getElementById('tbMy');if(t){var d=t.querySelector('.undot');if(has){if(!d){d=document.createElement('span');d.className='undot';t.appendChild(d);}}else if(d){d.remove();}}
 var mt=document.getElementById('tbMsg');if(mt){var md=mt.querySelector('.undot');if(chatUnread>0){if(!md){md=document.createElement('span');md.className='undot';mt.appendChild(md);}}else if(md){md.remove();}}}
async function checkUnread(){if(!ME||!ME.uid){chatUnread=0;renderChatBadge();return;}try{var since=new Date(chatSeenTs()||1).toISOString();var d=(await SB.from('messages').select('id,sender').gt('created_at',since)).data||[];chatUnread=d.filter(function(m){return m.sender!==ME.uid;}).length;}catch(e){}renderChatBadge();
 if(chatGlobalSub){try{SB.removeChannel(chatGlobalSub);}catch(e){}}
 chatGlobalSub=SB.channel('gmsg').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},function(p){var m=p.new;if(!m||m.sender===ME.uid)return;if(curConv&&m.conversation===curConv.id&&$('chatmodal')&&$('chatmodal').classList.contains('on')){markChatSeen();return;}chatUnread++;renderChatBadge();}).subscribe();}
function timeAgo(ts){if(!ts)return '';var s=Math.floor((Date.now()-new Date(ts).getTime())/1000);if(s<60)return T[LANG].justNow;if(s<3600)return Math.floor(s/60)+T[LANG].minAgo;if(s<86400)return Math.floor(s/3600)+T[LANG].hrAgo;var days=Math.floor(s/86400);if(days<7)return days+T[LANG].dayAgo;return new Date(ts).toLocaleDateString();}
async function loadConvos(){var data=[];try{data=(await SB.from('conversations').select('*').or('customer.eq.'+ME.uid+',designer.eq.'+ME.uid).order('last_at',{ascending:false})).data||[];}catch(e){}CHATS=data;await fetchProfiles(data.map(otherUid));
 var seen=chatSeenTs();
 await Promise.all(data.map(async function(c){try{var last=(await SB.from('messages').select('body,lang,tr,sender,created_at').eq('conversation',c.id).order('created_at',{ascending:false}).limit(1)).data;c._last=last&&last[0]||null;
   var un=(await SB.from('messages').select('id',{count:'exact',head:true}).eq('conversation',c.id).neq('sender',ME.uid).gt('created_at',new Date(seen||1).toISOString()));c._unread=un.count||0;
 }catch(e){c._last=null;c._unread=0;}}));
 renderChatList();}
function renderChatList(){var rows=CHATS.map(function(c){var o=PROFCACHE[otherUid(c)]||{name:'User'};
   var last=c._last;var prev=last?((last.sender===ME.uid?T[LANG].youPrefix:'')+msgText(last)):T[LANG].sayHi;
   var un=c._unread||0;
   return `<div class="cv${un?' unreadcv':''}" onclick="openConvoById('${c.id}')">${avChip(o)}<div class="cvmid"><div class="cvtop"><div class="cvn">${esc(o.name)}</div><div class="cvt">${last?esc(timeAgo(last.created_at)):''}</div></div><div class="cvp">${esc(prev)}</div></div>${un?`<span class="cvbadge">${un>99?'99+':un}</span>`:''}</div>`;}).join('');

// ===== 후기 번역 (OpenAI/ChatGPT · /api/translate 서버 경유 · 모든 언어) =====
async function translateText(text,target){
 target=target||LANG||'en';
 try{
  var r=await fetch('/api/translate',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text:text,target:target})});
  if(!r.ok)return null; var j=await r.json();
  return j&&j.translated?j.translated:null;
 }catch(e){return null;}
}
function trLabel(){return LANG==='ko'?'번역 보기':LANG==='ja'?'翻訳':LANG==='th'?'แปล':'Translate';}
function trOrig(){return LANG==='ko'?'원문 보기':LANG==='ja'?'原文を見る':LANG==='th'?'ต้นฉบับ':'Original';}
function trBtnHtml(t){t=(t||'').trim();if(!t)return '';return '<button type="button" class="trbtn" onclick="transRev(this)"><i class="ti ti-language"></i> '+trLabel()+'</button>';}
async function transRev(btn){
 var wrap=btn.parentNode, rt=wrap.querySelector('.rt'); if(!rt)return;
 if(btn.dataset.on==='1'){ rt.textContent=rt.dataset.o||rt.textContent; rt.classList.remove('trd'); btn.dataset.on='0'; btn.innerHTML='<i class="ti ti-language"></i> '+trLabel(); return; }
 if(!rt.dataset.o) rt.dataset.o=rt.textContent;
 btn.disabled=true; var old=btn.innerHTML; btn.innerHTML='<i class="ti ti-loader-2"></i> …';
 var tr=await translateText(rt.dataset.o,LANG);
 btn.disabled=false;
 if(tr&&tr.trim()&&tr.trim()!==(rt.dataset.o||'').trim()){ rt.textContent=tr; rt.classList.add('trd'); btn.dataset.on='1'; btn.innerHTML='<i class="ti ti-arrow-back-up"></i> '+trOrig(); }
 else if(tr&&tr.trim()){ rt.textContent=tr; btn.innerHTML='<i class="ti ti-check"></i> '+(LANG==='ko'?'원문과 동일':'Same'); btn.disabled=true; }
 else{ btn.innerHTML=old; toast(LANG==='ko'?'번역 실패, 잠시 후 다시':'Translation failed'); }
}

var _remindAction=null;
async function checkBookingReminders(){
 if(!(ME&&ME.uid)){var el0=$('bkremind');if(el0)el0.classList.remove('on');return;}
 try{
  var rows=(await SB.from('bookings').select('id,designer,date,time,status').eq('customer',ME.uid).in('status',['accepted','done']).order('date',{ascending:true}).limit(40)).data||[];
  if(!rows.length)return;
  await fetchProfiles(rows.map(function(b){return b.designer;}));
  var reviewed={};try{(await SB.from('designer_reviews').select('booking').eq('customer',ME.uid)).data.forEach(function(r){reviewed[r.booking]=1;});}catch(e){}
  var ymd=function(dt){return dt.toISOString().slice(0,10);};var now=new Date();var todayS=ymd(now);var tmrS=ymd(new Date(now.getTime()+864e5));
  var nm=function(uid){return (PROFCACHE[uid]||{}).name||'디자이너';};
  var dismissed={};try{dismissed=JSON.parse(localStorage.getItem('beautia_remind_x')||'{}');}catch(e){}
  var soon=rows.filter(function(b){return b.status==='accepted'&&(b.date===todayS||b.date===tmrS);});
  var doneUnrev=rows.filter(function(b){return b.status==='done'&&!reviewed[b.id];});
  var pick=null,txt='';
  if(soon.length){var b=soon[0];var key='book_'+b.id+'_'+todayS;
   if(!dismissed[key]){var tmpl=(b.date===todayS?T[LANG].remToday:T[LANG].remTomorrow);txt=tmpl.replace('{name}',nm(b.designer)).replace('{t}',b.time||'');pick={type:'book',key:key};}}
  if(!pick&&doneUnrev.length){var b2=doneUnrev[0];var key2='rev_'+b2.id;
   if(!dismissed[key2]){txt=T[LANG].remReview.replace('{name}',nm(b2.designer));pick={type:'review',key:key2,bid:b2.id,designer:b2.designer};}}
  var el=$('bkremind');if(!el)return;
  if(!pick){el.classList.remove('on');return;}
  _remindAction=pick;$('bkremindTxt').textContent=txt;el.classList.add('on');
 }catch(e){}
}

(function(){
 if(!('ontouchstart' in window))return;
 var el=document.createElement('div');el.className='ptr';el.innerHTML='<i class="ti ti-refresh"></i>';document.body.appendChild(el);
 var sy=0,pull=0,active=false,busy=false;
 window.addEventListener('touchstart',function(e){if(busy||window.scrollY>0||document.body.style.overflow==='hidden')return;sy=e.touches[0].clientY;active=true;pull=0;},{passive:true});
 window.addEventListener('touchmove',function(e){if(!active||busy)return;pull=e.touches[0].clientY-sy;
  if(pull>0&&window.scrollY<=0){var p=Math.min(pull,150);el.style.transform='translateX(-50%) translateY('+(p*0.5)+'px) rotate('+(p*1.8)+'deg)';el.style.opacity=Math.min(1,p/70);}},{passive:true});
 window.addEventListener('touchend',async function(){if(!active)return;active=false;
  if(pull>90&&window.scrollY<=0&&!busy){busy=true;el.classList.add('spin');
   try{await Promise.all([loadDesigners(),loadFeatured()]);if(ME&&ME.uid){loadSaves();loadFollows();checkUnread();loadBkBadge();}}catch(e){}
   el.classList.remove('spin');busy=false;toast(T[LANG].refreshed);}
  el.style.transform='translateX(-50%) translateY(0)';el.style.opacity=0;pull=0;});
})();

(function(){var sy=0,locked=false;
 function anyOpen(){return !!document.querySelector('.modal.on,.wmodal.on,.lmodal.on,.imodal.on,.idmodal.on,.pfmodal.on,.chatmodal.on');}
 function sync(){var open=anyOpen();
   if(open&&!locked){sy=window.scrollY||window.pageYOffset||0;document.body.style.top=(-sy)+'px';document.body.classList.add('mlock');locked=true;}
   else if(!open&&locked){document.body.classList.remove('mlock');document.body.style.top='';locked=false;window.scrollTo(0,sy);}}
 var mo=new MutationObserver(sync);
 ['dmodal','wmodal','lmodal','imodal','idmodal','pfmodal','chatmodal','famodal','bkmodal'].forEach(function(id){var el=document.getElementById(id);if(el)mo.observe(el,{attributes:true,attributeFilter:['class']});});
})();
