<style>

let USERLOC=null;
function haversine(a,b){var R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180,la1=a[0]*Math.PI/180,la2=b[0]*Math.PI/180;var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);return 2*R*Math.asin(Math.sqrt(x));}
function distOf(city){if(!USERLOC)return 0;var c=CITY_COORDS[city];if(!c)return 9e9;return haversine([USERLOC.lat,USERLOC.lng],c);}

let CHATS=[],curConv=null,chatSub=null,PROFCACHE={};
function avChip(o){return o.avatar?`<div class="cav" style="background-image:url('${im(o.avatar,120)}')"></div>`:`<div class="cav mono" style="background:${gradFor(o.name)}">${esc((o.name||'U')[0])}</div>`;}
function otherUid(c){return c.customer===ME.uid?c.designer:c.customer;}
async function ensureLoginC(){if(ME&&ME.uid)return true;openLogin('');return false;}
async function fetchProfiles(ids){var need=ids.filter(function(x){return x&&!PROFCACHE[x];});if(need.length){try{var d=(await SB.from('profiles').select('id,nickname,shop').in('id',need)).data||[];d.forEach(function(p){PROFCACHE[p.id]={name:p.nickname||(p.shop&&p.shop.name)||'User',avatar:(p.shop&&p.shop.avatar)||''};});}catch(e){}}need.forEach(function(x){if(!PROFCACHE[x])PROFCACHE[x]={name:'User',avatar:''};});}
async function openChat(){if(!(await ensureLoginC()))return;curConv=null;await loadConvos();$('chatmodal').classList.add('on');markChatSeen();}
function closeChat(){if(chatSub){try{SB.removeChannel(chatSub);}catch(e){}chatSub=null;}$('chatmodal').classList.remove('on');curConv=null;}
// 안 읽음 배지
let chatUnread=0,chatGlobalSub=null;
function chatSeenTs(){return parseInt(localStorage.getItem('beautia_chat_seen')||'0',10)||0;}
function markChatSeen(){try{localStorage.setItem('beautia_chat_seen',''+Date.now());}catch(e){}chatUnread=0;renderChatBadge();}
function renderChatBadge(){var a=$('avatar');if(a){var b=a.querySelector('.unread');if(chatUnread>0){if(!b){b=document.createElement('span');b.className='unread';a.appendChild(b);}}else if(b){b.remove();}}}
async function checkUnread(){if(!ME||!ME.uid){chatUnread=0;renderChatBadge();return;}try{var since=new Date(chatSeenTs()||1).toISOString();var d=(await SB.from('messages').select('id,sender').gt('created_at',since)).data||[];chatUnread=d.filter(function(m){return m.sender!==ME.uid;}).length;}catch(e){}renderChatBadge();
 if(chatGlobalSub){try{SB.removeChannel(chatGlobalSub);}catch(e){}}
 chatGlobalSub=SB.channel('gmsg').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},function(p){var m=p.new;if(!m||m.sender===ME.uid)return;if(curConv&&m.conversation===curConv.id&&$('chatmodal')&&$('chatmodal').classList.contains('on')){markChatSeen();return;}chatUnread++;renderChatBadge();}).subscribe();}
async function loadConvos(){var data=[];try{data=(await SB.from('conversations').select('*').or('customer.eq.'+ME.uid+',designer.eq.'+ME.uid).order('last_at',{ascending:false})).data||[];}catch(e){}CHATS=data;await fetchProfiles(data.map(otherUid));renderChatList();}
function renderChatList(){var rows=CHATS.map(function(c){var o=PROFCACHE[otherUid(c)]||{name:'User'};return `<div class="cv" onclick="openConvoById('${c.id}')">${avChip(o)}<div class="cvmid"><div class="cvn">${esc(o.name)}</div></div><i class="ti ti-chevron-right" style="color:var(--sub)"></i></div>`;}).join('');$('chatcard').innerHTML=`<div class="chead"><div class="chl">${T[LANG].messages}</div><button class="cx" onclick="closeChat()">×</button></div><div class="cvlist">${rows||('<div class="cempty"><i class="ti ti-messages" style="font-size:34px;color:#d8c9cc"></i><p>'+T[LANG].noChats+'</p></div>')}</div>`;}
function openConvoById(id){var c=CHATS.find(function(x){return x.id===id;});if(c)openConvo(c);}
async function startConvoWith(did){var d=dById(did);if(!d||!d.uid){toast(T[LANG].cantChat);return null;}if(d.uid===ME.uid){toast(T[LANG].cantChatSelf);return null;}PROFCACHE[d.uid]={name:(LANG==='ko'&&d.ko)?d.ko:d.name,avatar:d.avatar||''};var conv=null;try{conv=(await SB.from('conversations').select('*').eq('customer',ME.uid).eq('designer',d.uid).maybeSingle()).data;}catch(e){}if(!conv){try{conv=(await SB.from('conversations').insert({customer:ME.uid,designer:d.uid}).select('*').maybeSingle()).data;}catch(e){}}return conv;}
async function openChatWith(did){if(!(await ensureLoginC()))return;var conv=await startConvoWith(did);if(!conv){toast(T[LANG].cantChat);return;}await loadConvos();var c=CHATS.find(function(x){return x.id===conv.id;})||conv;$('chatmodal').classList.add('on');openConvo(c);}
async function openConvo(c){curConv=c;var msgs=[];try{msgs=(await SB.from('messages').select('*').eq('conversation',c.id).order('created_at',{ascending:true})).data||[];}catch(e){}c._msgs=msgs;renderThread();markChatSeen();if(chatSub){try{SB.removeChannel(chatSub);}catch(e){}}chatSub=SB.channel('msg-'+c.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'conversation=eq.'+c.id},function(p){var m=p.new;if((c._msgs||[]).some(function(x){return x.id===m.id;}))return;c._msgs.push(m);renderThread(true);}).subscribe();}
function msgText(m){if(!m.lang||m.lang===LANG)return m.body;return (m.tr&&m.tr[LANG])?m.tr[LANG]:m.body;}
function renderThread(){var c=curConv;if(!c)return;var o=PROFCACHE[otherUid(c)]||{name:'User'};var body=(c._msgs||[]).map(function(m){var mine=m.sender===ME.uid;var needTr=(m.lang&&m.lang!==LANG);return `<div class="mrow ${mine?'me':''}"><div class="mbub">${esc(msgText(m))}</div>${needTr?`<button class="morig" onclick="toggleOrig(this,'${m.id}')">${T[LANG].showOrig}</button>`:''}</div>`;}).join('');$('chatcard').innerHTML=`<div class="chead"><button class="cback" onclick="backToList()"><i class="ti ti-chevron-left"></i></button>${avChip(o)}<div class="chl2">${esc(o.name)}</div><button class="cx" onclick="closeChat()">×</button></div><div class="cthread" id="cthread">${body||('<div class="cempty"><p>'+T[LANG].sayHi+'</p></div>')}</div><div class="cinput"><input id="cmsg" maxlength="1000" placeholder="${T[LANG].typeMsg}" onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()"><i class="ti ti-send"></i></button></div>`;var th=$('cthread');if(th)th.scrollTop=th.scrollHeight;(c._msgs||[]).forEach(function(m){if(m.lang&&m.lang!==LANG&&!(m.tr&&m.tr[LANG])&&m.body)translateMsg(m);});}
function backToList(){if(chatSub){try{SB.removeChannel(chatSub);}catch(e){}chatSub=null;}curConv=null;loadConvos();}
async function sendChat(){var inp=$('cmsg');if(!inp||!curConv)return;var v=inp.value.trim();if(!v)return;inp.value='';curConv._msgs=curConv._msgs||[];try{var data=(await SB.from('messages').insert({conversation:curConv.id,sender:ME.uid,body:v,lang:LANG,tr:{}}).select('*').maybeSingle()).data;if(data&&!curConv._msgs.some(function(x){return x.id===data.id;}))curConv._msgs.push(data);}catch(e){}try{SB.from('conversations').update({last_at:new Date().toISOString()}).eq('id',curConv.id).then(function(){},function(){});}catch(e){}renderThread();}
async function translateMsg(m){try{var res=await SB.functions.invoke('translate',{body:{text:m.body,target:LANG}});if(res.error||!res.data||!res.data.translated)return;m.tr=m.tr||{};m.tr[LANG]=res.data.translated;try{SB.from('messages').update({tr:m.tr}).eq('id',m.id).then(function(){},function(){});}catch(e){}if(curConv)renderThread();}catch(e){}}
function toggleOrig(btn,id){var m=((curConv&&curConv._msgs)||[]).find(function(x){return x.id===id;});if(!m)return;var bub=btn.parentNode.querySelector('.mbub');if(btn.dataset.o){bub.textContent=msgText(m);btn.textContent=T[LANG].showOrig;btn.dataset.o='';}else{bub.textContent=m.body;btn.textContent=T[LANG].showTr;btn.dataset.o='1';}}

// ===== 검색 연관 키워드 =====
var SYN={'펌':['헤어'],'다운펌':['헤어'],'매직':['헤어'],'염색':['헤어'],'발레아쥬':['헤어'],'커트':['헤어'],'컷':['헤어'],'머리':['헤어'],'헤어':['헤어'],'래쉬':['속눈썹'],'속눈썹':['속눈썹'],'연장':['속눈썹'],'네일':['네일'],'젤':['네일'],'젤네일':['네일'],'메이크업':['메이크업'],'화장':['메이크업'],'신부':['브라이덜'],'웨딩':['브라이덜'],'결혼':['브라이덜'],'피부':['스킨'],'스킨':['스킨'],'hair':['Hair'],'perm':['Hair'],'color':['Hair'],'balayage':['Hair'],'nail':['Nail'],'gel':['Nail'],'lash':['Lash'],'eyelash':['Lash'],'makeup':['Makeup'],'skin':['Skin'],'bridal':['Bridal'],'wedding':['Bridal'],'서울':['Seoul'],'오사카':['Osaka'],'도쿄':['Tokyo']};
function buildPool(){var s=[];function add(x){if(x&&s.indexOf(x)<0)s.push(x);}allD().forEach(function(d){add(d.name);add(d.ko);add(d.city);add(d.area);(d.spec||[]).forEach(add);});['Hair','Makeup','Nail','Lash','Skin','Bridal'].forEach(function(c){add(cl(c));});return s;}
function suggestFor(q){q=(q||'').toLowerCase().trim();if(!q)return [];var pool=buildPool(),out=[],seen={};function push(t){if(!t)return;var k=(''+t).toLowerCase();if(!seen[k]){seen[k]=1;out.push(t);}}pool.forEach(function(t){if((''+t).toLowerCase().indexOf(q)>=0)push(t);});Object.keys(SYN).forEach(function(key){if(q.indexOf(key)>=0||key.indexOf(q)>=0){SYN[key].forEach(function(v){push(cl(v));});}});return out.slice(0,7);}
var CURSUG=[];
function onSearchInput(){render();renderSuggest();}
function renderSuggest(){var box=$('sugbox');if(!box)return;var q=$('q')?$('q').value:'';CURSUG=suggestFor(q);if(!q||!CURSUG.length){box.style.display='none';box.innerHTML='';return;}box.innerHTML=CURSUG.map(function(t,i){return `<div class="sug" onmousedown="pickSug(${i})"><i class="ti ti-search"></i> ${esc(t)}</div>`;}).join('');box.style.display='block';}
function pickSug(i){var t=CURSUG[i];if(t==null)return;$('q').value=t;render();var box=$('sugbox');if(box)box.style.display='none';}
function hideSuggest(){setTimeout(function(){var box=$('sugbox');if(box)box.style.display='none';},160);}

async function loadDesigners(){try{
  var rows=(await SB.from('profiles').select('id,nickname,role,region,bio,interests,shop,avatar_url,full_name,created_at').limit(300)).data;
  if(!rows)return;

    var s=p.shop||{};var photos=(s.photos||[]).filter(Boolean);

    list.push({id:'u_'+p.id,uid:p.id,name:p.nickname||s.name||p.full_name||'Designer',ko:'',
      cat:(s.specialties&&s.specialties[0])||(p.interests&&p.interests[0])||'Hair',

      bio:p.bio||'',avatar:s.avatar||p.avatar_url||'',insta:(s.insta||'').replace(/^@/,''),

      sns:Object.keys(s.sns||{}).filter(function(k){return (s.sns||{})[k];}),reviews:[]});
  });
  DUSERS=list;buildTiles();renderCities();render();

  <h3 class="serif" style="margin-bottom:4px">Featured 추가</h3><div class="pfsub">원작자 인스타 크레딧으로 올라가요</div>

// 모달 열리면 스크롤 위치 보존하며 배경 잠금
(function(){var sy=0,locked=false;
 function anyOpen(){return !!document.querySelector('.modal.on,.wmodal.on,.lmodal.on,.imodal.on,.idmodal.on,.pfmodal.on,.chatmodal.on');}
 function sync(){var open=anyOpen();
   if(open&&!locked){sy=window.scrollY||window.pageYOffset||0;document.body.style.top=(-sy)+'px';document.body.classList.add('mlock');locked=true;}
   else if(!open&&locked){document.body.classList.remove('mlock');document.body.style.top='';locked=false;window.scrollTo(0,sy);}}
 var mo=new MutationObserver(sync);
 ['dmodal','wmodal','lmodal','imodal','idmodal','pfmodal','chatmodal','famodal'].forEach(function(id){var el=document.getElementById(id);if(el)mo.observe(el,{attributes:true,attributeFilter:['class']});});
})();
