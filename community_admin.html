<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beautia 커뮤니티 어드민</title>
<link rel="icon" type="image/png" href="logo-icon.png">
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
:root{--ink:#1F1A1C;--ink2:#574C50;--sub:#9C928E;--line:#ECE6E3;--line2:#F4EFEC;--soft:#F7F3F1;--tint:#FBF8F6;--pagebg:#F4F0ED;--rose:#B5828C;--plum:#6E4A50;--plum2:#5A3A40;--gold:#C98A3C;--rosebg:#FBEFF1;--plumbg:#F1ECEE;--goldbg:#F5EEE1;--r1:8px;--r2:12px;--red:#C0504D;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--pagebg);color:var(--ink);line-height:1.5;}
a{color:inherit;text-decoration:none;}.tnum{font-variant-numeric:tabular-nums;}.muted{color:var(--sub);}
.btn{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r1);font-weight:700;font-size:13px;padding:8px 14px;display:inline-flex;align-items:center;gap:6px;transition:.12s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--plum);color:#fff;}.btn-ghost{background:#fff;color:var(--plum);border:1px solid var(--line);}
.hdr{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;}
.hwrap{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;height:60px;padding:0 24px;}
.logo{font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:22px;color:var(--plum);}
.logo small{font-style:normal;font-family:'Pretendard';font-size:12px;font-weight:700;color:var(--sub);margin-left:7px;}
.hr{margin-left:auto;display:flex;gap:8px;}
.wrap{max-width:1180px;margin:0 auto;padding:22px 24px 60px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r2);padding:16px 18px;}
.kpi .l{font-size:12px;color:var(--sub);font-weight:600;}
.kpi .n{font-size:26px;font-weight:800;color:var(--plum);margin-top:5px;}
.kpi .s{font-size:11px;color:var(--sub);margin-top:3px;}
@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr);}}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;}
.toolbar{display:flex;gap:10px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:var(--r1);padding:9px 12px;font-family:inherit;font-size:13px;background:#fff;outline:none;}
.toolbar input{flex:1;min-width:180px;}
.cnt{font-size:13px;color:var(--sub);margin-left:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:11.5px;font-weight:700;color:var(--sub);text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--tint);white-space:nowrap;}
td{font-size:13px;padding:12px 14px;border-bottom:1px solid var(--line2);vertical-align:middle;}
tr:hover td{background:var(--tint);}
.tcat{font-size:11px;font-weight:800;color:var(--rose);}
.ttitle{font-weight:700;color:var(--ink);max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbadge{font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;margin-left:5px;}
.b-pin{background:var(--plumbg);color:var(--plum);}.b-hide{background:#EEE;color:#888;}
.who{color:var(--ink2);}.rb{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:5px;margin-left:4px;background:var(--rosebg);color:#9A5E6A;}
.rb.owner{background:var(--plumbg);color:var(--plum);}.rb.official{background:var(--goldbg);color:#9A7B3C;}
.act{display:flex;gap:6px;}
.iconbtn{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);}
.iconbtn:hover{background:var(--tint);}
.iconbtn.on{background:var(--plumbg);color:var(--plum);border-color:transparent;}
.iconbtn.del:hover{background:#FBEDEC;color:var(--red);border-color:#F0CFCC;}
.iconbtn .ti{font-size:16px;}
.empty{text-align:center;color:var(--sub);padding:50px;font-size:14px;}
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.catstat{background:#fff;border:1px solid var(--line);border-radius:30px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink2);}
.catstat b{color:var(--plum);margin-left:4px;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:var(--r1);opacity:0;transition:.25s;z-index:90;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%);}
.note{background:#fff;border:1px dashed var(--line);border-radius:var(--r2);padding:14px 16px;margin-top:16px;font-size:12.5px;color:var(--sub);line-height:1.6;}
</style>
</head>
<body>
<header class="hdr"><div class="hwrap">
  <span class="logo">Beautia<small>커뮤니티 어드민</small></span>
  <div class="hr">
    <a class="btn btn-ghost" href="community.html" target="_blank"><i class="ti ti-external-link"></i> 커뮤니티 보기</a>
    <button class="btn btn-ghost" onclick="render()"><i class="ti ti-refresh"></i> 새로고침</button>
  </div>
</div></header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="bar" id="catbar"></div>
  <div class="panel">
    <div class="toolbar">
      <input id="q" placeholder="제목·작성자 검색" oninput="render()">
      <select id="fcat" onchange="render()"><option value="">전체 카테고리</option></select>
      <select id="fstate" onchange="render()"><option value="">전체 상태</option><option value="pinned">📌 공지</option><option value="hidden">🙈 숨김</option><option value="visible">노출중</option></select>
      <select id="fsort" onchange="render()"><option value="new">최신순</option><option value="hot">인기순</option><option value="cmt">댓글순</option></select>
      <span class="cnt" id="cnt"></span>
    </div>
    <div style="overflow-x:auto"><table id="tbl"></table></div>
  </div>
  <div class="note">⚠️ 이 어드민은 <b>이 브라우저(localStorage)</b>의 커뮤니티 데이터를 관리해요. 여러 기기/사용자 공통 관리·회원 관리·신고 처리는 <b>백엔드(Supabase 등)</b> 연결 후 가능해요. (회원 정보는 기기별 저장이라 여기선 글/댓글 관리만 제공)</div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='beautia_comm2';
const CATS=['질문','후기','정보','모델모집','자유','사장님','구인구직'];
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function timeago(t){const d=(Date.now()-t)/1000;if(d<3600)return Math.floor(d/60)+'분 전';if(d<86400)return Math.floor(d/3600)+'시간 전';if(d<2592000)return Math.floor(d/86400)+'일 전';return new Date(t).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});}
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('on');clearTimeout(e._);e._=setTimeout(()=>e.classList.remove('on'),1800);}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{seq:100,posts:[]};}catch(e){return{seq:100,posts:[]};}}
function save(db){localStorage.setItem(KEY,JSON.stringify(db));}
let DB=load();

$('fcat').innerHTML='<option value="">전체 카테고리</option>'+CATS.map(c=>`<option>${c}</option>`).join('');

function rbCls(r){return r==='owner'?'rb owner':(r==='official'?'rb official':'rb');}
function rbName(r){return r==='owner'?'사장님':(r==='official'?'공식':'손님');}

function render(){
  DB=load();
  const posts=DB.posts||[];
  const cmts=posts.reduce((a,p)=>a+(p.cmts?p.cmts.length:0),0);
  const pinned=posts.filter(p=>p.pinned).length, hidden=posts.filter(p=>p.hidden).length;
  const likes=posts.reduce((a,p)=>a+(p.like||0),0);
  $('kpis').innerHTML=[
    ['전체 글',posts.length,''],['댓글',cmts,''],['좋아요',likes,''],['📌 공지',pinned,''],['🙈 숨김',hidden,'']
  ].map(([l,n])=>`<div class="kpi"><div class="l">${l}</div><div class="n tnum">${n}</div></div>`).join('');
  $('catbar').innerHTML=CATS.map(c=>`<span class="catstat">${c}<b class="tnum">${posts.filter(p=>p.cat===c&&!p.hidden).length}</b></span>`).join('');
  // filter
  const q=$('q').value.trim().toLowerCase(),fc=$('fcat').value,fs=$('fstate').value,so=$('fsort').value;
  let list=posts.slice();
  if(fc)list=list.filter(p=>p.cat===fc);
  if(fs==='pinned')list=list.filter(p=>p.pinned);else if(fs==='hidden')list=list.filter(p=>p.hidden);else if(fs==='visible')list=list.filter(p=>!p.hidden);
  if(q)list=list.filter(p=>((p.title||'')+(p.nick||'')).toLowerCase().includes(q));
  if(so==='hot')list.sort((a,b)=>(b.like+b.scrap*2)-(a.like+a.scrap*2));else if(so==='cmt')list.sort((a,b)=>b.cmts.length-a.cmts.length);else list.sort((a,b)=>b.t-a.t);
  $('cnt').textContent=list.length+'개';
  $('tbl').innerHTML=`<thead><tr><th>카테고리</th><th>제목</th><th>작성자</th><th>지역</th><th>작성</th><th>❤</th><th>💬</th><th>관리</th></tr></thead><tbody>`+
    (list.length?list.map(p=>`<tr style="${p.hidden?'opacity:.55':''}">
      <td><span class="tcat">${esc(p.cat)}</span></td>
      <td><span class="ttitle">${p.pinned?'📌 ':''}${esc(p.title)}</span>${p.hidden?'<span class="tbadge b-hide">숨김</span>':''}</td>
      <td><span class="who">${esc(p.nick)}</span><span class="${rbCls(p.role)}">${rbName(p.role)}</span></td>
      <td class="muted">${p.region&&p.region!=='전체'?esc(p.region):'-'}</td>
      <td class="muted" style="white-space:nowrap">${timeago(p.t)}</td>
      <td class="tnum">${p.like||0}</td>
      <td class="tnum">${p.cmts?p.cmts.length:0}</td>
      <td><div class="act">
        <button class="iconbtn ${p.pinned?'on':''}" title="공지 고정" onclick="togglePin(${p.id})"><i class="ti ti-pin"></i></button>
        <button class="iconbtn ${p.hidden?'on':''}" title="숨김" onclick="toggleHide(${p.id})"><i class="ti ti-eye-off"></i></button>
        <button class="iconbtn del" title="삭제" onclick="del(${p.id})"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`).join(''):'<tr><td colspan="8"><div class="empty">글이 없어요. 커뮤니티에서 글을 작성하면 여기에 표시돼요.</div></td></tr>')+'</tbody>';
}
function togglePin(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;p.pinned=!p.pinned;save(DB);render();toast(p.pinned?'공지로 고정했어요 📌':'고정을 해제했어요');}
function toggleHide(id){const p=DB.posts.find(x=>x.id===id);if(!p)return;p.hidden=!p.hidden;save(DB);render();toast(p.hidden?'숨김 처리했어요 🙈':'다시 노출했어요');}
function del(id){if(!confirm('이 글을 삭제할까요? 되돌릴 수 없어요.'))return;DB.posts=DB.posts.filter(x=>x.id!==id);save(DB);render();toast('삭제했어요');}
render();
window.addEventListener('focus',render);
</script>
</body>
</html>
